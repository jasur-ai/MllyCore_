<!DOCTYPE html>
<html lang="uz" class="auth-required">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Workspace - MllyCore</title>
  <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
  <link rel="apple-touch-icon" href="images/favicon.svg">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#0f172a">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/icons.js"></script>
  <script>(function(){try{var s=localStorage.getItem('mllycore-theme')||'dark';document.body.className=s==='light'?'theme-light':'theme-dark'}catch(_){document.body.className='theme-dark';}})();</script>
</head>
<body>
  <a href="#content" class="skip-link">Asosiy kontentga o'tish</a>
  <div id="app">
    <div id="content" class="workspace-app" role="main" tabindex="-1" aria-label="Workspace asosiy kontenti"><div class="workspace-empty loading-copy"><h3>Yuklanmoqda...</h3><p>Workspace tayyorlanmoqda.</p></div></div>
  </div>
  <script src="js/theme.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/firebase-service.js"></script>
  <script src="js/auth-guard.js"></script>
  <script src="js/layout.js"></script>
  <script>
    const qs = (key) => new URLSearchParams(location.search).get(key);
    const escapeHtml = (value) => String(value || '').replace(/[&<>"']/g, (char) => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'
    }[char]));
    const fmtDate = (value) => {
      if (!value) return '-';
      const date = value.toDate ? value.toDate() : new Date(value);
      return Number.isNaN(date.getTime()) ? '-' : date.toLocaleString('uz-UZ');
    };
    const fmtDateInput = (value) => {
      if (!value) return '';
      const date = new Date(value);
      return Number.isNaN(date.getTime()) ? '' : date.toISOString().slice(0, 16);
    };
    const focusType = qs('focus');
    const focusEntityId = qs('entity');

    // Xavfsizlik: 15 soniya ichida yuklanmasa, Yuklanmoqda matnini xato xabariga almashtiramiz
    window.__mllyLoadingTimeout = setTimeout(() => {
      const el = document.getElementById('content');
      if (!el || !el.querySelector('.loading-copy')) return;
      el.innerHTML = '<div class=\'workspace-empty\'><h3>Yuklashda xatolik</h3><p>Sahifa uzoq vaqt yuklanmadi. Internet aloqangizni tekshiring yoki qayta urinib koring.</p></div>';
    }, 15000);
    // Agar renderWorkspace muvaffaqiyatli bajarilsa, bu timeoutni tozalaymiz
    window.__clearLoadingTimeout = () => { if (window.__mllyLoadingTimeout) { clearTimeout(window.__mllyLoadingTimeout); window.__mllyLoadingTimeout = null; } };

    window.UTIL = window.UTIL || {
      toast: (msg) => {
        const el = document.createElement('div');
        el.className = 'toast';
        el.textContent = msg;
        document.body.appendChild(el);
        requestAnimationFrame(() => el.classList.add('show'));
        setTimeout(() => {
          el.classList.remove('show');
          setTimeout(() => el.remove(), 250);
        }, 2200);
      }
    };

    let chatUnsubscribe = null;
    let presenceUnsubs = [];
    let workspaceState = null;
    let chatSeenTimer = null;
    let chatSubscribedTeamId = '';
    let lastWorkspaceRenderKey = '';
    let _presenceVisibilityHandler = null;
    
    // FIX (presenceUnsubs cleanup): barcha presence obunalarini xavfsiz tozalash
    function _cleanupPresence() {
      if (presenceUnsubs.length) {
        for (var i = 0; i < presenceUnsubs.length; i++) {
          try { if (typeof presenceUnsubs[i] === 'function') presenceUnsubs[i](); } catch (_) {}
        }
        presenceUnsubs = [];
      }
      if (_presenceVisibilityHandler) {
        document.removeEventListener('visibilitychange', _presenceVisibilityHandler);
        _presenceVisibilityHandler = null;
      }
    }

    function setFeedback(id, text, tone = 'error') {
      const node = document.getElementById(id);
      if (!node) return;
      node.className = `text-sm muted feedback-${tone}`;
      node.textContent = text || '';
    }

    function workspaceRenderKey(data) {
      if (!data?.team?.id) return '';
      const latestIdea = (data.ideas || [])[0];
      const latestTask = (data.tasks || [])[0];
      const latestSubmission = (data.taskSubmissions || [])[0];
      const latestMessage = (data.messages || []).length ? data.messages[data.messages.length - 1] : null;
      return [
        data.team.id,
        data.members?.length || 0,
        data.ideas?.length || 0,
        data.tasks?.length || 0,
        data.taskSubmissions?.length || 0,
        data.messages?.length || 0,
        latestIdea?.id || '',
        latestTask?.id || '',
        latestSubmission?.id || '',
        latestMessage?.id || '',
        latestMessage?.seenBy?.length || 0,
        data.team.updatedAt?.seconds || data.team.updatedAt || ''
      ].join('|');
    }

    function memberOptions(members, includeLead = true) {
      return members
        .filter((member) => includeLead || member.role !== 'team_lead')
        .map((member) => `<option value="${member.userId}">${escapeHtml(member.user?.name || member.user?.email || member.userId)}</option>`)
        .join('');
    }

    function renderChat(messages, currentUserId) {
      const target = document.getElementById('chatMessages');
      if (!target) return;
      target.innerHTML = messages.length ? messages.map((message) => `
        <div class="msg ${message.senderUserId === currentUserId ? 'me' : ''}" data-message-id="${message.id}">
          <div class="avatar-sm avatar">${escapeHtml(message.senderAvatar || 'U')}</div>
          <div class="bubble">
            <div class="meta">
              <span>${escapeHtml(message.senderName || 'User')} / ${fmtDate(message.createdAt || message.clientCreatedAt)}</span>
              ${message.senderUserId === currentUserId ? `<span class="chat-checks ${(Array.isArray(message.seenBy) && message.seenBy.length > 1) ? 'is-read' : ''}">${(Array.isArray(message.seenBy) && message.seenBy.length > 1) ? '\u2713\u2713' : '\u2713'}</span>` : ''}
            </div>
            <div>${escapeHtml(message.text)}</div>
          </div>
        </div>
      `).join('') : '<div class="chat-empty">Chat hali bo\'sh. Birinchi xabarni yozing.</div>';
      if (focusType === 'chat' && focusEntityId) {
        const focused = target.querySelector(`[data-message-id="${focusEntityId}"]`);
        if (focused) {
          focused.scrollIntoView({ behavior: 'smooth', block: 'center' });
          focused.classList.add('workspace-flash');
          setTimeout(() => focused.classList.remove('workspace-flash'), 1800);
        } else {
          target.scrollTop = target.scrollHeight;
        }
      } else {
        target.scrollTop = target.scrollHeight;
      }
      const count = document.getElementById('chatCount');
      if (count) count.textContent = messages.length;
      const stat = document.getElementById('chatStat');
      if (stat) stat.textContent = messages.length;
    }

    // FIX (chatSeen race condition): ketma-ket so'rovlarni queue'ga solamiz
    // va ularni serial (navbatma-navbat) yuboramiz. Agar ikkinchi so'rov kelsa,
    // birinchisi bekor qilinadi va faqat eng oxirgisi ishga tushadi.
    var _chatSeenQueue = [];
    var _chatSeenProcessing = false;

    async function _processChatSeenQueue() {
      if (_chatSeenProcessing) return;
      _chatSeenProcessing = true;
      while (_chatSeenQueue.length > 0) {
        var task = _chatSeenQueue.shift();
        try {
          await MllyCore.markTeamChatSeen(task.teamId);
        } catch (_) {}
      }
      _chatSeenProcessing = false;
    }

    function canMarkChatSeen() {
      var chatBox = document.getElementById('chatMessages');
      if (!chatBox) return false;
      var rect = chatBox.getBoundingClientRect();
      var visible = rect.bottom > 100 && rect.top < (window.innerHeight || document.documentElement.clientHeight) - 40;
      return document.visibilityState === 'visible' && document.hasFocus() && visible;
    }

    function scheduleChatSeen(messages, currentUserId, teamId) {
      // Queue'ga faqat bitta yozuv: avvalgisini tozalab, eng oxirgisini qo'shamiz
      if (_chatSeenQueue.length > 0) {
        _chatSeenQueue = []; // oldingi navbatni bekor qilish
      }
      var hasUnseen = (messages || []).some(function(message) {
        var seenBy = Array.isArray(message.seenBy) ? message.seenBy : [];
        return message.senderUserId !== currentUserId && !seenBy.includes(currentUserId);
      });
      if (!hasUnseen || !teamId || !canMarkChatSeen()) return;
      
      _chatSeenQueue.push({ teamId: teamId });
      // 800ms debounce — bu vaqt ichida yana bir xabar kelsa, queue tozalanadi
      if (chatSeenTimer) clearTimeout(chatSeenTimer);
      chatSeenTimer = setTimeout(_processChatSeenQueue, 800);
    }

    async function markWorkspaceNotificationsSeen(data) {
      const ideaIds = (data.ideas || []).map((item) => item.id);
      const taskIds = (data.tasks || []).map((item) => item.id);
      const types = ['team_message', 'task_assigned', 'task_claimed', 'task_progress', 'task_completed', 'task_auto_assigned'];

      await MllyCore.markNotificationsRead({
        teamId: data.team.id,
        relatedEntityIds: taskIds,
        types: types.filter((type) => type !== 'team_message')
      }).catch(() => {});

      await MllyCore.markNotificationsRead({
        teamId: data.team.id,
        relatedEntityIds: ideaIds,
        types: ['idea_created', 'idea_imported', 'startup_created', 'startup_owner_changed']
      }).catch(() => {});

      await MllyCore.markNotificationsRead({
        teamId: data.team.id,
        types: ['team_message']
      }).catch(() => {});
    }

    function renderMembers(data, currentUserId, isLead, isManagerViewer) {
      const target = document.getElementById('membersList');
      if (!target) return;
      target.innerHTML = data.members.map((member) => `
        <div class="workspace-list-row">
          <div class="avatar" style="position:relative">${escapeHtml(member.user?.avatar || 'U')}<span class="presence-dot" id="presence-${member.userId}" title="offline" style="position:absolute;right:-2px;bottom:-2px;width:11px;height:11px;border-radius:50%;background:#64748b;border:2px solid var(--surface,#0f172a);"></span></div>
          <div class="workspace-list-copy">
            <strong>${escapeHtml(member.user?.name || member.user?.email || member.userId)}</strong>
            <span>@${escapeHtml(member.user?.username || 'user')} / ${escapeHtml(member.user?.email || '')}</span>
          </div>
          <div class="workspace-stack-tight" style="justify-items:end">
            <span class="badge ${member.role === 'team_lead' ? 'badge-active' : ''}">${escapeHtml(member.role)}</span>
            ${member.userId === currentUserId ? '<span class="workspace-pill-note">Bu siz</span>' : ''}
          </div>
          ${isLead && !isManagerViewer && member.userId !== currentUserId && member.role !== 'team_lead' ? `
          <div class="member-role-edit" style="display:flex;gap:6px;margin-top:8px;align-items:center;">
            <select class="select btn-sm" data-member-role="${member.userId}">
              <option value="member" ${member.role === 'member' ? 'selected' : ''}>Member (yozishi mumkin)</option>
              <option value="viewer" ${member.role === 'viewer' ? 'selected' : ''}>Viewer (faqat o'qiydi)</option>
            </select>
            <button class="btn btn-secondary btn-sm" data-member-role-save="${member.userId}">Rolni saqlash</button>
          </div>` : ''}
        </div>
      `).join('');
      document.querySelectorAll('[data-member-role-save]').forEach((button) => {
        button.addEventListener('click', async () => {
          const userId = button.dataset.memberRoleSave;
          const sel = document.querySelector('[data-member-role="' + userId + '"]');
          const role = sel ? sel.value : 'member';
          button.disabled = true;
          try {
            await MllyCore.updateMemberRole({ teamId: data.team.id, userId, role });
            UTIL.toast("A'zo roli yangilandi: " + role);
            await refreshWorkspace(data.team.id, currentUserId);
          } catch (error) {
            UTIL.toast(error.message || "Rol o'zgartirilmadi.");
            button.disabled = false;
          }
        });
      });
    }

    function renderEntries(data, currentUserId, isLead, isManagerViewer) {
      const ideas = data.ideas.filter((entry) => entry.entryType !== 'startup');
      const startups = data.ideas.filter((entry) => entry.entryType === 'startup');
      document.getElementById('ideaStat').textContent = ideas.length;
      document.getElementById('startupStat').textContent = startups.length;
      document.getElementById('ideasCount').textContent = `${ideas.length} ta`;
      document.getElementById('startupsCount').textContent = `${startups.length} ta`;

      document.getElementById('startupList').innerHTML = startups.length ? startups.map((item) => `
        <div class="workspace-record workspace-record-startup workspace-record-accent" data-startup-id="${item.id}">
          <div class="workspace-record-top">
            <div>
              <h3>${escapeHtml(item.title)}</h3>
              <div class="workspace-inline-meta">
                <span>Startup</span>
                <span>Mas'ul: ${escapeHtml(item.ownerName || 'Belgilanmagan')}</span>
              </div>
            </div>
            <span class="badge badge-active">${escapeHtml(item.status || 'Startup')}</span>
          </div>
          <p>${escapeHtml(item.description || 'Startup tafsiloti kiritilmagan.')}</p>
          ${isLead && !isManagerViewer ? `
            <div class="workspace-subgrid cols-2 mt-3">
              <select class="select" data-owner-select="${item.id}">
                <option value="">Mas'ul tanlang</option>
                ${memberOptions(data.members, true)}
              </select>
              <button class="btn btn-secondary" data-owner-save="${item.id}">Mas'ulni saqlash</button>
            </div>
            <div class="text-sm muted" data-owner-feedback="${item.id}"></div>
          ` : ''}
        </div>
      `).join('') : '<div class="workspace-empty"><h3>Startup yo\'q</h3><p>Hozircha team lead startup qo\'shmagan.</p></div>';

      document.getElementById('ideasList').innerHTML = ideas.length ? ideas.map((item) => `
        <a href="idea.html?id=${item.id}" class="workspace-record workspace-record-idea" data-idea-id="${item.id}">
          <div class="workspace-record-top">
            <div>
              <h3>${escapeHtml(item.title)}</h3>
              <div class="workspace-inline-meta">
                <span>G'oya</span>
                <span>Mas'ul: ${escapeHtml(item.ownerName || item.createdByName || 'Belgilanmagan')}</span>
              </div>
            </div>
            <span class="badge">${escapeHtml(item.status || 'Raw')}</span>
          </div>
          <p>${escapeHtml(item.description || 'G\'oya tavsifi kiritilmagan.')}</p>
        </a>
      `).join('') : '<div class="workspace-empty"><h3>G\'oya yo\'q</h3><p>Workspace ichida hali g\'oya yaratilmagan.</p></div>';

      document.querySelectorAll('[data-owner-save]').forEach((button) => {
        button.addEventListener('click', async () => {
          const ideaId = button.dataset.ownerSave;
          const ownerUserId = document.querySelector(`[data-owner-select="${ideaId}"]`)?.value;
          const feedback = document.querySelector(`[data-owner-feedback="${ideaId}"]`);
          if (feedback) {
            feedback.className = 'text-sm muted feedback-error';
            feedback.textContent = '';
          }
          button.disabled = true;
          try {
            await MllyCore.updateStartupOwner({ teamId: data.team.id, ideaId, ownerUserId });
            if (feedback) {
              feedback.className = 'text-sm muted feedback-success';
              feedback.textContent = "Mas'ul yangilandi.";
            }
            await refreshWorkspace(data.team.id, currentUserId);
          } catch (error) {
            if (feedback) feedback.textContent = error.message || "Mas'ul yangilanmadi.";
            button.disabled = false;
          }
        });
      });
    }

    function renderTasks(data, currentUserId, isLead, isViewer) {
      const tasks = data.tasks || [];
      const submissions = data.taskSubmissions || [];
      const memberCount = data.members.length || 1;
      const target = document.getElementById('tasksList');
      const count = document.getElementById('taskCount');
      if (count) count.textContent = `${tasks.length} ta`;

      target.innerHTML = tasks.length ? tasks.map((task) => {
        const taskSubs = submissions.filter((item) => item.taskId === task.id);
        const hasSubmitted = taskSubs.some((item) => item.userId === currentUserId);
        // Backend 'assignedTo' saqlaydi (assignedUserId/assignedUserName/assignmentMode emas),
        // shuning uchun ularni member'lardan va mavjud maydonlardan chiqarib olamiz.
        const assignedId = task.assignedTo || task.assignedUserId || null;
        const assignedName = task.assignedUserName
          || ((data.members || []).find((m) => m.userId === assignedId)?.user?.name)
          || ((data.members || []).find((m) => m.userId === assignedId)?.name)
          || null;
        const mode = task.assignmentMode || (assignedId ? 'direct' : 'open');
        const isAssignedToCurrent = assignedId === currentUserId;
        const canClaim = !isViewer && mode === 'open' && !assignedId;
        const teamRequired = task.requiredCount || Math.max(1, Math.ceil(memberCount * 0.65));
        const canSubmit = !isViewer && (
          (mode === 'team') ||
          ((mode === 'direct' || mode === 'open') && isAssignedToCurrent)
        ) && !hasSubmitted && task.status !== 'completed';

        return `
          <div class="workspace-task-card" data-task-id="${task.id}">
            <div class="workspace-task-head">
              <div>
                <h3 style="margin:0">${escapeHtml(task.title)}</h3>
                <div class="workspace-task-meta">
                  <span class="badge">${escapeHtml(task.assignmentMode || 'open')}</span>
                  <span class="badge">${escapeHtml(task.status || 'open')}</span>
                  <span class="badge" style="${task.blocked ? 'background:#7f1d1d;color:#fff' : ''}">${task.blocked ? '🔒 Bloklangan' : 'Ochiq'}</span>
                  <span class="badge">Deadline: ${escapeHtml(task.deadlineAt ? fmtDate(task.deadlineAt) : 'yo\'q')}</span>
                </div>
              </div>
              <span class="badge badge-progress">${task.assignmentMode === 'team' ? `${task.progressCount || 0}/${memberCount} kishi` : `${task.progressCount || 0}/${task.requiredCount || 1}`}</span>
            </div>
            <p class="workspace-helper">${escapeHtml(task.description || 'Tavsif kiritilmagan.')}</p>
            <div class="workspace-detail-list">
              <div class="workspace-detail-row"><span>Mas'ul</span><strong>${escapeHtml(assignedName || (mode === 'team' ? 'Jamoaviy' : 'Hali olinmagan'))}</strong></div>
              <div class="workspace-detail-row"><span>Yaratuvchi</span><strong>${escapeHtml(task.createdByName || 'User')}</strong></div>
              ${task.requiredSkill ? `<div class="workspace-detail-row"><span>Ko'nikma</span><strong>${escapeHtml(task.requiredSkill)}${(data.members || []).some((m) => Array.isArray(m.user?.skills) && m.user.skills.includes(task.requiredSkill)) ? '' : ' ⚠ gap'}</strong></div>` : ''}
              ${task.assignmentMode === 'team' ? `<div class="workspace-detail-row"><span>Progress</span><strong>${task.progressCount || 0}/${memberCount} kishi bajardi (threshold: ${teamRequired})</strong></div>` : ''}
              ${Array.isArray(task.dependsOn) && task.dependsOn.length ? `<div class="workspace-detail-row"><span>Bog'liq </span><strong>${task.dependsOn.map((id) => escapeHtml(((data.tasks || []).find((t) => t.id === id) || {}).title || id)).join(', ')}</strong></div>` : ''}
            </div>
            ${taskSubs.length ? `
              <div class="workspace-message-stack">
                ${taskSubs.map((sub) => `
                  <div class="workspace-message-item">
                    <strong>${escapeHtml(sub.userName)}</strong>
                    <span>${escapeHtml(sub.resultText)}</span>
                    ${sub.resultLink ? `<a class="text-sm" href="${escapeHtml(sub.resultLink)}" target="_blank" rel="noopener noreferrer" style="color:#7dd3fc;margin-top:8px;display:inline-flex">Linkni ochish</a>` : ''}
                  </div>
                `).join('')}
              </div>
            ` : ''}
            <div class="workspace-task-footer">
              ${canClaim ? `<button class="btn btn-secondary" data-task-claim="${task.id}">Topshiriqni olish</button>` : '<span class="workspace-helper">Topshiriq oqimi faol</span>'}
              ${canSubmit ? `
                <div class="workspace-task-submit-grid" style="flex:1">
                  <input class="input" data-task-result="${task.id}" placeholder="Natijani yozing">
                  <input class="input" data-task-link="${task.id}" placeholder="Pitch yoki ish linki">
                  <button class="btn btn-primary" data-task-submit="${task.id}">Tugatdim</button>
                </div>
              ` : ''}
            </div>
            ${!isViewer ? `
            <div class="workspace-task-subtools" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;">
              ${(((mode === 'team') || (mode === 'open' && isAssignedToCurrent) || (mode === 'direct' && isAssignedToCurrent)) || (isLead && (mode === 'open'))) ? `
              <button class="btn btn-secondary btn-sm" data-task-attach="${task.id}" title="Fayl biriktirish (shifrlangan)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;margin-right:4px"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg> Fayl biriktirish</button>
              ` : ''}
              ${(((mode === 'team') || (mode === 'open' && isAssignedToCurrent) || (mode === 'direct' && isAssignedToCurrent)) || (isLead && (mode === 'open'))) ? `
              <button class="btn btn-secondary btn-sm" data-task-github="${task.id}" title="Vazifani GitHub Issuesga yuborish">🐙 GitHub'ga</button>
              ` : ''}
              <input type="file" id="file-${task.id}" style="display:none">
              ${isLead ? `<div class="workspace-task-reassign" style="display:flex;gap:6px;align-items:center;flex:1;">
                <select class="select btn-sm" id="reassignSel-${task.id}" aria-label="Mas'ulni tanlang">${memberOptions(data.members, false)}</select>
                <button class="btn btn-secondary btn-sm" data-task-reassign="${task.id}">Mas'ulni o'zgartirish</button>
              </div>` : ''}
            </div>` : ''}
            <div class="text-xs muted" data-attach-feedback="${task.id}"></div>
            <div class="text-sm muted" data-task-feedback="${task.id}"></div>
          </div>
        `;
      }).join('') : '<div class="workspace-empty"><h3>Topshiriq yo\'q</h3><p>Lead yoki jamoa yangi topshiriq qo\'shganda shu yerda ko\'rinadi.</p></div>';

      document.querySelectorAll('[data-task-claim]').forEach((button) => {
        button.addEventListener('click', async () => {
          const taskId = button.dataset.taskClaim;
          const feedback = document.querySelector(`[data-task-feedback="${taskId}"]`);
          if (feedback) {
            feedback.className = 'text-sm muted feedback-error';
            feedback.textContent = '';
          }
          button.disabled = true;
          try {
            await MllyCore.claimOpenTask(taskId);
            await refreshWorkspace(data.team.id, currentUserId);
          } catch (error) {
            if (feedback) feedback.textContent = error.message || 'Topshiriq olinmadi.';
            button.disabled = false;
          }
        });
      });

      document.querySelectorAll('[data-task-submit]').forEach((button) => {
        button.addEventListener('click', async () => {
          const taskId = button.dataset.taskSubmit;
          const resultText = document.querySelector(`[data-task-result="${taskId}"]`)?.value || '';
          const resultLink = document.querySelector(`[data-task-link="${taskId}"]`)?.value || '';
          const feedback = document.querySelector(`[data-task-feedback="${taskId}"]`);
          if (feedback) {
            feedback.className = 'text-sm muted feedback-error';
            feedback.textContent = '';
          }
          button.disabled = true;
          try {
            await MllyCore.submitTaskResult({ taskId, resultText, resultLink });
            await refreshWorkspace(data.team.id, currentUserId);
          } catch (error) {
            if (feedback) feedback.textContent = error.message || 'Natija yuborilmadi.';
            button.disabled = false;
          }
        });
      });

      // Mas'ulni o'zgartirish (faqat team lead) — client-side Firestore update
      // (Firestore qoidasi: team lead task'ni yangilashi mumkin, shuning uchun ruxsat bor).
      document.querySelectorAll('[data-task-reassign]').forEach((button) => {
        button.addEventListener('click', async () => {
          const taskId = button.dataset.taskReassign;
          const sel = document.getElementById('reassignSel-' + taskId);
          const fb = document.querySelector('[data-task-feedback="' + taskId + '"]');
          const newId = sel ? sel.value : '';
          if (!newId) { if (fb) fb.textContent = "Mas'ul uchun a'zo tanlang."; return; }
          button.disabled = true;
          try {
            await MllyCore.reassignTask({ teamId: data.team.id, taskId, assignedTo: newId });
            if (fb) { fb.className = 'text-sm muted feedback-success'; fb.textContent = "Mas'ul yangilandi."; }
            await refreshWorkspace(data.team.id, currentUserId);
          } catch (error) {
            if (fb) fb.textContent = error.message || "Mas'ul o'zgartirilmadi.";
            button.disabled = false;
          }
        });
      });

      // T4 - Vaqt kuzatuvi (log-time)
      document.querySelectorAll('[data-task-logtime]').forEach((button) => {
        button.addEventListener('click', async () => {
          const taskId = button.dataset.taskLogtime;
          const minutes = window.prompt('Sarflangan vaqtni daqiqalarda kiriting:', '30');
          if (minutes === null) return;
          const ms = parseInt(minutes, 10) * 60000;
          if (!(ms > 0)) { UTIL.toast('Iltimos, musbat son kiriting.'); return; }
          button.disabled = true;
          try {
            await MllyCore.logTime({ teamId: data.team.id, taskId, durationMs: ms });
            UTIL.toast("Vaqt qo'shildi.");
          } catch (error) {
            UTIL.toast(error.message || "Vaqt qo'shilmadi.");
          } finally {
            button.disabled = false;
          }
        });
      });

      // T16 - Shifrlangan fayl biriktirish (client-side AES-GCM, server ochiq fayl ko'rmaydi)
      // Xavfsizlik: button ko'rinsa ham, qo'shimcha runtime tekshiruvi
      document.querySelectorAll('[data-task-attach]').forEach((button) => {
        button.addEventListener('click', () => {
          const taskId = button.dataset.taskAttach;
          // Agar button disabled bo'lsa, hech narsa qilmaymiz
          if (button.disabled) return;
          document.getElementById('file-' + taskId)?.click();
        });
      });
      document.querySelectorAll('[id^="file-"]').forEach((input) => {
        input.addEventListener('change', async () => {
          const taskId = input.id.replace('file-', '');
          const file = input.files && input.files[0];
          const fb = document.querySelector(`[data-attach-feedback="${taskId}"]`);
          if (!file) return;
          if (fb) fb.textContent = 'Shifrlanmoqda...';
          try {
            // HTTPS tekshiruvi — crypto.subtle faqat secure context'da ishlaydi
            if (!window.isSecureContext || !crypto.subtle) {
              throw new Error('Fayl shifrlash uchun HTTPS (localhost) talab qilinadi. Sayt HTTPS orqali ochilganiga ishonch hosil qiling.');
            }
            const buf = await file.arrayBuffer();
            const rawKey = crypto.getRandomValues(new Uint8Array(32));
            const key = await crypto.subtle.importKey('raw', rawKey, { name: 'AES-GCM' }, false, ['encrypt']);
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, buf);
            const enc = new Uint8Array(ct);
            const path = `attachments/${data.team.id}/${taskId}/${Date.now()}_${file.name}.enc`;
            await MllyCore.uploadEncryptedFile({ filePath: path, data: enc, contentType: 'application/octet-stream' });
            // Uint8Array -> base64 (String.fromCharCode.apply emas, chunki u ba'zi brauzerlarda ishlamaydi)
            const uint8ToB64 = (u8) => { let s=''; for(let i=0;i<u8.length;i++) s+=String.fromCharCode(u8[i]); return btoa(s); };
            const ivB64 = uint8ToB64(iv);
            await MllyCore.createAttachmentMeta({ teamId: data.team.id, taskId, fileName: file.name, size: file.size, iv: ivB64 });
            const keyB64 = uint8ToB64(rawKey);
            if (fb) fb.textContent = "✅ Yuklandi. Shifr kaliti (qabul qiluvchiga alohida ulashingiz kerak): " + keyB64;
            UTIL.toast('Fayl shifrlab yuklandi.');
          } catch (error) {
            if (fb) fb.textContent = error.message || 'Yuklashda xatolik.';
          } finally {
            input.value = '';
          }
        });
      });

      // T31 - GitHub'ga yuborish (vazifani GitHub issue ga aylantirish)
      document.querySelectorAll('[data-task-github]').forEach((button) => {
        button.addEventListener('click', async () => {
          const taskId = button.dataset.taskGithub;
          const repo = window.prompt("GitHub repo (masalan: user/repo):", '');
          if (!repo) return;
          const token = window.prompt("GitHub token (ixtiyoriy — bo'sh qoldirsangiz serverdagi GITHUB_TOKEN env avtomatik ishlatiladi):", '');
          button.disabled = true;
          try {
            const r = await MllyCore.syncGithubIssue({ taskId, repo: repo.trim(), token: (token || '').trim() });
            UTIL.toast('GitHub issue yaratildi');
            if (r.issueUrl) button.insertAdjacentHTML('afterend', ` <a class="github-synced" href="${escapeHtml(r.issueUrl)}" target="_blank" rel="noopener">✓ GitHub'da</a>`);
          } catch (e) { UTIL.toast(e.message); }
          finally { button.disabled = false; }
        });
      });

      if (isLead) {
        const assignmentMode = document.getElementById('taskAssignmentMode');
        const assigneeWrap = document.getElementById('taskAssigneeWrap');
        const toggleAssignee = () => {
          if (!assignmentMode || !assigneeWrap) return;
          assigneeWrap.style.display = assignmentMode.value === 'direct' ? '' : 'none';
        };
        assignmentMode?.addEventListener('change', toggleAssignee);
        toggleAssignee();
      }
    }

                      <h4 style="margin:0 0 8px;font-size:14px;color:var(--text);">🐙 T31 — GitHub Issues Sync</h4>
                      <div class="ws-arch-doc">
                        <p><strong>Nima qiladi:</strong> Vazifani (task) GitHub Issues'ga issue sifatida yaratadi.</p>
                        <div class="ws-arch-flow">

                          <span class="ws-arch-arrow">→</span>
                          <span class="ws-arch-step"><strong>Server:</strong> taskni Firestore'dan o'qiydi, rollarni tekshiradi</span>
                          <span class="ws-arch-arrow">→</span>
                          <span class="ws-arch-step"><strong>Server:</strong> GitHub API'ga so'rov:<br><code>POST https://api.github.com/repos/{repo}/issues</code></span>
                          <span class="ws-arch-arrow">→</span>
                          <span class="ws-arch-step"><strong>Server:</strong> <code>githubIssueId</code> + <code>issueUrl</code> → task'ga yozadi</span>
                        </div>
                        <div class="ws-arch-details">
                          <span class="ws-arch-tag tag-auth">Auth: <code>GITHUB_TOKEN</code> env yoki shaxsiy token</span>
                          <span class="ws-arch-tag tag-sec">Xavfsizlik: Token hech qayerda saqlanmaydi</span>
                          <span class="ws-arch-tag tag-limit">Rate limit: GitHub API 5000 req/soat</span>
                          <span class="ws-arch-tag tag-sec">Xatolik: 404→repo yo'q, 401→token noto'g'ri, 502→aloqa</span>
                        </div>

                      <h4 style="margin:0 0 8px;font-size:14px;color:var(--text);">🔒 T16 — Shifrlangan fayl biriktirish</h4>
                      <div class="ws-arch-doc">
                        <p><strong>Nima qiladi:</strong> Fayl brauzerda AES-256-GCM bilan shifrlanadi, so'ng Firebase Storage'ga yuklanadi. Server <strong>hech qachon</strong> ochiq faylni yoki shifr kalitini ko'rmaydi — zero-trust arxitektura.</p>
                        <div class="ws-arch-flow">
                          <span class="ws-arch-step">1. <strong>Client:</strong> Fayl tanlanadi → <code>file.arrayBuffer()</code></span>
                          <span class="ws-arch-arrow">→</span>
                          <span class="ws-arch-step">2. <strong>Client:</strong> AES-256-GCM kaliti (32B) + IV (12B) yaratiladi:<br><code>crypto.getRandomValues()</code></span>
                          <span class="ws-arch-arrow">→</span>
                          <span class="ws-arch-step">3. <strong>Client:</strong> Fayl shifrlanadi:<br><code>crypto.subtle.encrypt({name:'AES-GCM', iv}, key, data)</code></span>
                          <span class="ws-arch-arrow">→</span>
                          <span class="ws-arch-step">4. <strong>Client→Storage:</strong> CIPHERTEXT → Firebase Storage<br><code>uploadBytes(storageRef, enc)</code></span>
                          <span class="ws-arch-arrow">→</span>
                          <span class="ws-arch-step">5. <strong>Client→Server:</strong> Metadata yuboriladi:<br><code>POST /api/create-attachment</code><br><span style="color:var(--text-muted,#8b949e);font-size:12px">faqat: teamId, fileName, size, IV, versionNote<br>★ Kalit (KEY) yuborilmaydi</span></span>
                          <span class="ws-arch-arrow">→</span>
                          <span class="ws-arch-step"><strong>Server:</strong> Firestore'ga metadata yozadi:<br><code>attachments/{id} → {fileName, iv, size, version}</code></span>
                          <span style="padding:6px 0;color:var(--text-muted,#8b949e);font-size:12px;text-align:center">Server fayl byte'larini ko'rmaydi, kalitni ko'rmaydi</span>
                          <span class="ws-arch-arrow">→</span>
                          <span class="ws-arch-step">6. <strong>Client:</strong> Shifr kaliti faqat yuklovchiga ko'rsatiladi<br>Qabul qiluvchiga alohida ulashish kerak (Telegram/email)</span>
                        </div>
                        <div style="margin-top:12px;background:rgba(47,129,247,0.06);border-radius:12px;padding:12px;border:1px solid rgba(47,129,247,0.12)">
                          <strong style="font-size:13px">📌 Backend nima qiladi?</strong>
                          <ul style="margin:6px 0 0;padding-left:18px;font-size:13px;color:var(--text-muted,#8b949e);line-height:1.7">
                            <li>Fayl byte'larini <strong>ko'rmaydi</strong> (Storage'ga to'g'ridan-to'g'ri client yuklaydi)</li>
                            <li>Shifr kalitini (KEY) <strong>ko'rmaydi</strong> (faqat yuklovchi biladi)</li>
                            <li>Faqat <strong>metadata</strong> saqlaydi: fileName, size, IV, version, versiya tarixi</li>
                            <li>IV (initialization vector) — deshifrlash uchun kerak, lekin kalitsiz foydasiz</li>
                            <li>Yangi versiya (T54): eski metadata <code>versions[]</code> ga arxivlanadi</li>
                          </ul>
                        </div>
                        <div class="ws-arch-details" style="margin-top:10px">
                          <span class="ws-arch-tag tag-crypto">Shifrlash: AES-256-GCM (Web Crypto API)</span>
                          <span class="ws-arch-tag tag-sec">Xavfsizlik: Server ochiq faylni ko'rmaydi (zero-trust)</span>
                          <span class="ws-arch-tag tag-ver">Versiyalash: T54 — har yangi yuklash eski versiyani saqlab qoladi</span>
                        </div>
                      </div>

      renderEntries(data, currentUserId, isLead, isManagerViewer);
      renderTasks(data, currentUserId, isLead, (membership?.role === 'viewer') || isManagerViewer);
      renderMembers(data, currentUserId, isLead, isManagerViewer);
      // T9 - Presence: har bir a'zo holatini realtime obuna qilish.
      // FIX (presenceUnsubs cleanup): avvalgi obunalarni to'liq tozalash
      _cleanupPresence();
      
      const PRESENCE_STALE_MS = 5 * 60 * 1000; // 5 daqiqa
      if (data.members) {
        data.members.forEach((member) => {
          MllyCore.subscribePresence(member.userId, (p) => {
            const dot = document.getElementById('presence-' + member.userId);
            if (!dot) return;
            // Statusni aniqlash
            let st = (p && p.status) || 'offline';
            // `updatedAt` bo'yicha stale check
            if (p) {
              const lastTs = p.updatedAt;
              if (typeof lastTs === 'number') {
                if (Date.now() - lastTs > PRESENCE_STALE_MS) {
                  st = 'offline';
                }
              } else if (lastTs && typeof lastTs.toMillis === 'function') {
                if (Date.now() - lastTs.toMillis() > PRESENCE_STALE_MS) {
                  st = 'offline';
                }
              }
            }
            dot.style.background = st === 'online' ? '#22c55e' : st === 'away' ? '#f59e0b' : '#64748b';
            dot.title = st;
          }).then((unsub) => { if (typeof unsub === 'function') presenceUnsubs.push(unsub); }).catch(() => {});
        });
      }
      // FIX: visibility change bo'lganda, agar tab visible bo'lsa, fresh presence subscribe qilish
      _presenceVisibilityHandler = function() {
        if (document.visibilityState === 'visible' && data.team && data.team.id) {
          refreshWorkspace(data.team.id, currentUserId);
        }
      };
      document.addEventListener('visibilitychange', _presenceVisibilityHandler);
      renderChat(data.messages || [], currentUserId);

      // FIX (accordion -> professional TAB pattern): Endi bo'limlar yuqorida
      // gorizontal tab bar sifatida ko'rinadi, birini bossangiz o'sha panel ochiladi,
      // qolganlari yopiladi. The ws-section-head elementlari avtomatik ws-tab ga aylanadi.
      (() => {
        const accordion = document.querySelector('.ws-accordion');
        if (!accordion) return;
        
        // Agar tab bar allaqachon mavjud bo'lsa, qayta yaratmaymiz
        if (accordion.querySelector('.ws-tab-bar')) return;
        
        const sections = Array.from(accordion.querySelectorAll('.ws-section'));
        if (!sections.length) return;
        const teamKey = 'mlly_sec_' + (data.team && data.team.id || '');
        
        // 1. Tab bar yaratish
        const tabBar = document.createElement('nav');
        tabBar.className = 'ws-tab-bar';
        tabBar.setAttribute('role', 'tablist');
        tabBar.setAttribute('aria-label', "Workspace bo'limlari");
        
        // 2. Har bir section head ni tab ga aylantirish
        const tabs = [];
        sections.forEach((sec) => {
          const head = sec.querySelector('.ws-section-head');
          if (!head) return;
          const tabId = sec.dataset.section || 'tab';
          
          // ws-section-head ni ws-tab ga aylantirish
          head.classList.remove('ws-section-head');
          head.classList.add('ws-tab');
          head.setAttribute('role', 'tab');
          head.setAttribute('aria-controls', 'tabpanel-' + tabId);
          head.dataset.tab = tabId;
          
          // ▾ ikonasini olib tashlash (tabs are not accordion)
          const ico = head.querySelector('.ws-section-ico');
          if (ico) ico.remove();
          
          tabBar.appendChild(head);
          tabs.push(head);
        });
        
        // 3. Section body larni tabpanel ga aylantirish
        const panels = [];
        sections.forEach((sec) => {
          const body = sec.querySelector('.ws-section-body');
          if (!body) return;
          const tabId = sec.dataset.section || 'panel';
          
          body.classList.remove('ws-section-body');
          body.classList.add('ws-tab-panel');
          body.setAttribute('role', 'tabpanel');
          body.dataset.tab = tabId;
          body.id = 'tabpanel-' + tabId;
          body.removeAttribute('hidden');
          
          panels.push(body);
        });
        
        // 4. Tab barni accordion boshiga qo'shish
        accordion.insertBefore(tabBar, accordion.firstChild);
        
        // 5. Section o'ramini olib tashlash (faqat panel qoladi)
        sections.forEach((sec) => {
          const body = sec.querySelector('.ws-tab-panel');
          if (body) {
            sec.parentNode.insertBefore(body, sec);
          }
          sec.remove();
        });
        
        // 6. Tab logikasi
        const setActive = (tab) => {
          const tabId = tab.dataset.tab || tab.getAttribute('aria-controls')?.replace('tabpanel-', '') || '';
          tabs.forEach((t) => {
            const isActive = t === tab;
            t.setAttribute('aria-selected', String(isActive));
            t.classList.toggle('active', isActive);
          });
          panels.forEach((p) => {
            const isActive = p.dataset.tab === tabId || p.id === 'tabpanel-' + tabId;
            p.hidden = !isActive;
            p.classList.toggle('active', isActive);
          });
          try { localStorage.setItem(teamKey, tabId); } catch (_) {}
        };
        
        tabs.forEach((tab) => {
          tab.addEventListener('click', () => setActive(tab));
        });
        
        // 7. Dastlabki holat
        let defaultTab = tabs.find((t) => t.dataset.tab === 'kanban');
        // localStorage dan tiklash
        try {
          const saved = localStorage.getItem(teamKey);
          if (saved) {
            const savedTab = tabs.find((t) => (t.dataset.tab === saved));
            if (savedTab) defaultTab = savedTab;
          }
        } catch (_) {}
        if (defaultTab) setActive(defaultTab);
        else if (tabs.length) setActive(tabs[0]);
      })();

      // Boshqaruv (sobiq "Faoliyat") ichki sub-nav: moliya / jamoa / integratsiya guruhlari.
      // Bosilganda activity panel-ning data-bq qiymatini o'zgartiramiz; CSS shu orqali
      // tegishli guruhdagi accordion-larni ko'rsatadi, qolganlarini yashiradi.
      (() => {
        const actPanel = document.getElementById('tabpanel-activity');
        if (!actPanel) return;
        const bqBtns = Array.from(actPanel.querySelectorAll('.ws-boshqaruv-nav .subnav-item'));
        if (!bqBtns.length) return;
        const setBq = (bq) => {
          actPanel.dataset.bq = bq;
          bqBtns.forEach((b) => b.setAttribute('aria-current', String(b.dataset.bq === bq)));
        };
        bqBtns.forEach((b) => b.addEventListener('click', () => setBq(b.dataset.bq)));
        // Klaviatura navigatsiyasi (ArrowLeft/Right) uchun qulaylik.
        const nav = actPanel.querySelector('.ws-boshqaruv-nav');
        nav?.addEventListener('keydown', (e) => {
          if (e.key !== 'ArrowRight' && e.key !== 'ArrowLeft') return;
          const i = bqBtns.indexOf(document.activeElement);
          if (i < 0) return;
          const next = e.key === 'ArrowRight' ? (i + 1) % bqBtns.length : (i - 1 + bqBtns.length) % bqBtns.length;
          bqBtns[next].focus();
          e.preventDefault();
        });
      })();

      // T21 / T23 / T24 / T28 / T30 / T36 — collapsible (ochiladigan) panel.
      // Har bir funksiya alohida bo'lim; ustidan bosganda ochiladi, ma'lumot faqat bir marta yuklanadi (tezlik uchun).
      (async () => {
        const teamIdT = data.team.id;
        const loadedAcc = {};

                // T46 — Webhook ro'yxatini yuklash, test / o'chirish (delete) amallari
        window.renderWebhooks = async (teamId, body) => {
          const status = document.getElementById('webhookStatus');
          const listEl = document.getElementById('webhookList');
          if (!listEl) return;
          try {
            const r = await MllyCore.getWebhookList(teamId);
            const hooks = r.webhooks || [];
            listEl.innerHTML = hooks.length ? hooks.map((h) => `
              <div class=\"workspace-message-item\" data-webhook-id=\"${h.id}\">
                <div>
                  <strong>${escapeHtml(h.url)}</strong>
                  <span>${(h.events || []).join(', ')}</span>
                </div>
                <div class=\"workspace-subgrid cols-2\" style=\"gap:6px;margin-top:6px\">
                  <button class=\"btn btn-secondary btn-sm\" data-webhook-test=\"${h.id}\">Test</button>
                  <button class=\"btn btn-danger btn-sm\" data-webhook-del=\"${h.id}\">O'chirish</button>
                </div>
              </div>`).join('') : '<div class=\"muted\">Hozircha webhook yo‘q</div>';

            listEl.querySelectorAll('[data-webhook-test]').forEach((btn) => {
              btn.addEventListener('click', async () => {
                btn.disabled = true;

        window.renderList = (container, title, arr, fmt) => {

        document.querySelectorAll('.ws-acc-head').forEach((head) => {
          head.addEventListener('click', async () => {

            head.setAttribute('aria-expanded', 'true');

            if (loadedAcc[key]) return;

            try {
              if (key === 'roadmap' && body) {
                const r = await MllyCore.getRoadmap(teamIdT); loadedAcc.roadmap = true;

              } else if (key === 'reputation' && body) {
                const r = await MllyCore.getReputation(teamIdT); loadedAcc.reputation = true;
                renderList(body, '🏅 Reputation', r.members, (m) => `<div class="workspace-message-item"><strong>${escapeHtml(m.name)}</strong> — ${m.reputation || 0} ball (${escapeHtml(m.role)})</div>`);
              } else if (key === 'activity' && body) {
                const r = await MllyCore.getActivityFeed(teamIdT); loadedAcc.activity = true;
                renderList(body, '📡 Activity', r.feed, (f) => `<div class="workspace-message-item"><span>${escapeHtml(f.kind || '')}</span> <span>${escapeHtml(f.action || f.type || f.text || '')}</span></div>`);
              } else if (key === 'backup' && body) {
                loadedAcc.backup = true;

              } else if (key === 'load' && body) {
                loadedAcc.load = true;
                const r = await MllyCore.getTeamLoad(teamIdT);
                const s = r.summary || {};
                document.getElementById('loadSummary').textContent = 'Jamoa: ' + (s.members || 0) + ' a’zo — ' + (s.overloaded || 0) + ' overloaded, ' + (s.busy || 0) + ' busy';
                const colorOf = (sig) => sig === 'overloaded' ? '#e5484d' : sig === 'busy' ? '#f59e0b' : '#22c55e';
                // FIX (Load signal): backend teamMembers da alohida `name` maydoni bo'lmasligi
                // mumkin, shuning uchun `m.name` bo'sh bo'lib, raw Firebase UID ko'rinadi.
                // `data.members` ichida `user?.name`/`user?.email` bor — shu yerdan topamiz.
                const nameOf = (m) => {
                  const mem = (data.members || []).find((mm) => mm.userId === m.userId);
                  return (mem && (mem.user?.name || mem.user?.email)) || m.name || m.userId || 'A’zo';
                };
                body.innerHTML = '<div class="workspace-message-stack">' + (r.load || []).map((m) => '<div class="workspace-message-item"><strong>' + escapeHtml(nameOf(m)) + '</strong> — ' + m.openTasks + ' ochiq, ' + (m.timeLoggedMs / 3600000).toFixed(1) + ' soat, ' + m.presence + ' <span style="color:' + colorOf(m.signal) + '">' + m.signal + '</span></div>').join('') + '</div>';
              } else if (key === 'webhooks' && body) {
                loadedAcc.webhooks = true;
                await renderWebhooks(teamIdT, body);
              } else if (key === 'analytics' && body) {
                loadedAcc.analytics = true;
                const r = await MllyCore.getIdeaAnalytics(teamIdT);
                const sd = r.stageDistribution || {};
                const stagesStr = Object.entries(sd).map((e) => e[0] + ': ' + e[1]).join(', ');
                const sum = document.getElementById('analyticsSummary');
                if (sum) sum.innerHTML = 'Jami: ' + r.total + ' | O‘rtacha RICE: ' + r.avgRice + ' | Ovozlar: ' + r.totalVotes + ' | Eski (stale): ' + r.staleCount + '<br>Stage: ' + (stagesStr || '-');
                const top = document.getElementById('analyticsTop');
                if (top) top.innerHTML =
                  '<div class="workspace-message-item"><strong>Top RICE:</strong> ' + (r.topByScore || []).map((x) => escapeHtml(x.title) + ' (' + x.rice + ')').join(', ') + '</div>' +
                  '<div class="workspace-message-item"><strong>Top ovoz:</strong> ' + (r.topByVotes || []).map((x) => escapeHtml(x.title) + ' (' + x.votes + ')').join(', ') + '</div>';
                const list = document.getElementById('analyticsList');
                  if (list) list.innerHTML = '<div class="workspace-message-stack">' + (r.ideas || []).map((i) => '<div class="workspace-message-item"><strong>' + escapeHtml(i.title) + '</strong> — RICE ' + i.rice + ', stage ' + escapeHtml(i.stage || '-') + ', ovoz ' + i.voteCount + (i.stale ? ' ⚠ stale' : '') + '</div>').join('') + '</div>';
              } else if (key === 'attachments' && body) {
                loadedAcc.attachments = true;
                const rA = await MllyCore.listAttachments({ teamId: teamIdT });
                const listA = document.getElementById('attachmentsList');
                const statusA = document.getElementById('attachmentsStatus');
                if (statusA) statusA.textContent = (rA.attachments || []).length + ' ta fayl';
                if (listA) listA.innerHTML = (rA.attachments || []).length ? (rA.attachments || []).map((a) => {
                  const vers = (a.versions || []);
                  const verHtml = vers.length ? '<div class="ws-sub" style="margin-top:6px;font-size:12px;color:var(--text-muted);">Tarix: ' + vers.slice().reverse().map((v) => 'v' + v.version + ' (' + escapeHtml(v.uploadedByName) + ')').join(', ') + '</div>' : '';
                  return '<div class="workspace-message-item"><strong>' + escapeHtml(a.fileName) + '</strong> <span>v' + (a.version || 1) + ' · ' + escapeHtml(a.uploadedByName) + (a.size ? ' · ' + (a.size / 1024).toFixed(1) + ' KB' : '') + '</span>' + verHtml + '</div>';
                }).join('') : '<div class="muted">Hozircha biriktirma yo‘q</div>';
              } else if (key === 'timezone' && body) {
                loadedAcc.timezone = true;
                const TZS = ['UTC', 'Asia/Tashkent', 'Asia/Almaty', 'Europe/Istanbul', 'Europe/Moscow', 'Europe/Berlin', 'Europe/London', 'America/New_York', 'America/Los_Angeles', 'Asia/Dubai', 'Asia/Kolkata', 'Australia/Sydney'];
                const optHtml = (sel) => TZS.map((z) => '<option value="' + z + '"' + (z === sel ? ' selected' : '') + '>' + z + '</option>').join('');
                const myTz = await MllyCore.getTimezone().catch(() => ({ timezone: 'UTC' }));
                const cur = myTz.timezone || 'UTC';
                ['tzMySelect', 'tzFromTz', 'tzToTz', 'tzScheduleTz'].forEach((id) => {
                  const el = document.getElementById(id);
                  if (el) el.innerHTML = optHtml(cur);

                const nowLocal = new Date(Date.now() - new Date().getTimezoneOffset() * 60000).toISOString().slice(0, 16);
                const fromEl = document.getElementById('tzFromInput');
                const schedEl = document.getElementById('tzScheduleWhen');
                if (fromEl && !fromEl.value) fromEl.value = nowLocal;
                if (schedEl && !schedEl.value) schedEl.value = nowLocal;
                const sList = document.getElementById('tzScheduleList');
                try {
                  const sR = await MllyCore.listSchedules({ teamId: teamIdT });
                  if (sList) sList.innerHTML = (sR.schedules || []).length ? (sR.schedules || []).map((s) => '<div class="workspace-message-item"><strong>' + escapeHtml(s.title) + '</strong> <span>' + escapeHtml(s.iso) + ' (' + escapeHtml(s.timezone) + ')</span></div>').join('') : '<div class="muted">Rejalashtirilgan eslatma yo‘q</div>';
                } catch (_) { if (sList) sList.textContent = ''; }
              }
            } catch (e) {
              if (body) body.textContent = e.message;
            }
          });

        // T30 Meeting saqlash
        document.getElementById('meetingSaveBtn')?.addEventListener('click', async () => {

            });

        // T46 Webhooks — qo'shish (add)
        document.getElementById('webhookAddBtn')?.addEventListener('click', async () => {

          const events = Array.from(document.querySelectorAll('.webhook-event:checked')).map((c) => c.value);
          const url = (urlInput?.value || '').trim();

          const btn = document.getElementById('webhookAddBtn');
          if (btn) btn.disabled = true;

            await MllyCore.addWebhook({ teamId: teamIdT, url, events: events.length ? events : ['*'] });

            if (status) status.textContent = 'Webhook qo‘shildi.';

          finally { if (btn) btn.disabled = false; }

        // T55 — Timezone preferences (shaxsiy timezone saqlash)
        document.getElementById('tzSaveBtn')?.addEventListener('click', async () => {

          const status = document.getElementById('tzSaveStatus');

            await MllyCore.saveTimezone({ timezone: sel?.value, teamId: teamIdT });
            if (status) status.textContent = 'Timezone saqlandi: ' + (sel?.value || '');
          } catch (e) { if (status) status.textContent = e.message; }

        // T55 — Time converter + working-hours check
        document.getElementById('tzConvertBtn')?.addEventListener('click', async () => {
          const iso = document.getElementById('tzFromInput')?.value;
          const fromTz = document.getElementById('tzFromTz')?.value || 'UTC';
          const toTz = document.getElementById('tzToTz')?.value || 'UTC';
          const resEl = document.getElementById('tzConvertResult');
          const whEl = document.getElementById('tzWhResult');
          if (!iso) { if (resEl) resEl.textContent = 'Vaqt kiriting.'; return; }
          try {
            const r = await MllyCore.convertTime({ iso, fromTz, toTz });
            if (resEl) resEl.textContent = iso + ' (' + fromTz + ') = ' + r.to.local + ' (' + toTz + ')';
            const wh = await MllyCore.checkWorkingHours({ iso, tz: fromTz });
            if (whEl) whEl.textContent = 'Ish vaqti (' + fromTz + '): ' + wh.localTime + ' — ' + (wh.within ? '✅ ichida' : '🌙 tashqarisida');
          } catch (e) { if (resEl) resEl.textContent = e.message; }
        });

        // T55 — Schedule a team reminder (rejalashtirilgan eslatma)
        document.getElementById('tzScheduleBtn')?.addEventListener('click', async () => {
          const title = document.getElementById('tzScheduleTitle')?.value;
          const iso = document.getElementById('tzScheduleWhen')?.value;
          const tz = document.getElementById('tzScheduleTz')?.value || 'UTC';
          const status = document.getElementById('tzScheduleStatus');
          if (!title || !iso) { if (status) status.textContent = 'Nomi va vaqtni kiriting.'; return; }
          try {
            await MllyCore.createSchedule({ teamId: teamIdT, title, iso, tz });
            if (status) status.textContent = 'Rejalashtirildi: ' + title;
            const sR = await MllyCore.listSchedules({ teamId: teamIdT });
            const sList = document.getElementById('tzScheduleList');
            if (sList) sList.innerHTML = (sR.schedules || []).map((s) => '<div class="workspace-message-item"><strong>' + escapeHtml(s.title) + '</strong> <span>' + escapeHtml(s.iso) + ' (' + escapeHtml(s.timezone) + ')</span></div>').join('');
          } catch (e) { if (status) status.textContent = e.message; }
        });

        // T48 — Live Collaboration: real-time kursolar va presence
        if (window.__mllyCollabCleanup) { try { window.__mllyCollabCleanup(); } catch (_) {} window.__mllyCollabCleanup = null; }
        const cursorLayer = document.createElement('div');
        cursorLayer.id = 'cursorLayer';
        cursorLayer.className = 'cursor-layer';
        document.body.appendChild(cursorLayer);
        const collabBar = document.createElement('div');
        collabBar.id = 'collabPresence';
        collabBar.className = 'collab-presence';
        document.querySelector('.workspace-command-tools')?.appendChild(collabBar);
        const myColor = '#' + Math.floor(Math.random() * 16777215).toString(16).padStart(6, '0');
        const myName = (window.MLLYCORE_PROFILE && (window.MLLYCORE_PROFILE.name || window.MLLYCORE_PROFILE.email)) || 'User';

        // FIX (complaint 10): jonli kursolar (kursorni kuzatib yuguradigan nuqtalar) ba'zan
        // bezovta qiladi. Shuning uchun ularni foydalanuvchi o'zi yoqishi/o'chirishi mumkin
        // (holat localStorage da saqlanadi). Presence (kim onlayn) esa doim ko'rinadi.
        const _cursorKey = 'mlly_cursor_enabled';
        let _cursorsOn = (() => { const v = localStorage.getItem(_cursorKey); return v === null ? true : v === '1'; })();
        let _unsubCursors = null;
        const _renderCursors = (cursors) => {
          if (!_cursorsOn) return;
          try {
            cursorLayer.innerHTML = '';
            const now = Date.now();
            const CURSOR_STALE_MS = 5 * 60 * 1000; // 5 daqiqa
            cursors.forEach((c) => {
              if (c.userId === window.MLLYCORE_AUTH_USER?.uid) return;
              // FIX: Kursorni faqat oxirgi 5 daqiqa ichida yangilangan bo'lsa ko'rsat
              const cursorTime = c.updatedAt;
              if (cursorTime) {
                const cursorMs = (typeof cursorTime.toMillis === 'function') ? cursorTime.toMillis() :
                               (typeof cursorTime === 'number') ? cursorTime :
                               (typeof cursorTime.seconds === 'number') ? cursorTime.seconds * 1000 : 0;
                if (cursorMs > 0 && now - cursorMs > CURSOR_STALE_MS) return; // eski kursor → o'tkazib yubor
              }
              const dot = document.createElement('div');
              dot.className = 'cursor-dot';
              dot.style.left = (c.x || 0) + 'px';
              dot.style.top = (c.y || 0) + 'px';
              dot.style.background = c.color || '#7dd3fc';
              dot.innerHTML = '<span class="cursor-label">' + escapeHtml(c.name || 'User') + '</span>';
              cursorLayer.appendChild(dot);
            });
          } catch (_) {}
        };
        const _move = (e) => {
          if (!_cursorsOn) return;
          const now = Date.now();
          if (now - (_move._last || 0) < 60) return;
          _move._last = now;
          MllyCore.updateCursor({ teamId: teamIdT, x: e.clientX, y: e.clientY, name: myName, color: myColor });
        };
        const _enableCursors = () => {
          if (_unsubCursors) return;
          window.addEventListener('mousemove', _move);
          _unsubCursors = MllyCore.subscribeCursors(teamIdT, _renderCursors);
          cursorLayer.style.display = '';
        };
        const _disableCursors = () => {
          try { window.removeEventListener('mousemove', _move); } catch (_) {}
          if (_unsubCursors) { try { _unsubCursors(); } catch (_) {} _unsubCursors = null; }
          cursorLayer.innerHTML = '';
          cursorLayer.style.display = 'none';
        };
        if (_cursorsOn) _enableCursors();

        const _cursorToggle = document.createElement('button');
        _cursorToggle.type = 'button';
        _cursorToggle.className = 'btn btn-tertiary btn-sm collab-toggle';
        _cursorToggle.textContent = _cursorsOn ? '👁 Kursolar: Yoq' : '👁 Kursolar: O‘ch';
        _cursorToggle.setAttribute('aria-pressed', String(_cursorsOn));
        _cursorToggle.title = 'Jonli kursolarni yoqish/o‘chirish';
        _cursorToggle.addEventListener('click', () => {
          _cursorsOn = !_cursorsOn;
          localStorage.setItem(_cursorKey, _cursorsOn ? '1' : '0');
          _cursorToggle.textContent = _cursorsOn ? '👁 Kursolar: Yoq' : '👁 Kursolar: O‘ch';
          _cursorToggle.setAttribute('aria-pressed', String(_cursorsOn));
          if (_cursorsOn) _enableCursors(); else _disableCursors();
        });
        collabBar.appendChild(_cursorToggle);

        window.__mllyCollabCleanup = () => {
          try { window.removeEventListener('mousemove', _move); } catch (_) {}
          try { if (cursorLayer.parentNode) cursorLayer.parentNode.removeChild(cursorLayer); } catch (_) {}
          try { if (collabBar.parentNode) collabBar.parentNode.removeChild(collabBar); } catch (_) {}
          try { if (_unsubCursors) _unsubCursors(); } catch (_) {}

        // T53 — Automated Weekly Report (Telegram + in-app)

            if (status) status.textContent = 'Yuborildi: ' + (r.sentTelegram || 0) + ' ta Telegram, xulosa: ' + JSON.stringify(r.summary);
          } catch (e) { if (status) status.textContent = e.message; }
          finally { if (btn) btn.disabled = false; }

      scheduleChatSeen(data.messages || [], currentUserId, data.team.id);

        const selector = focusType === 'startup' ? `[data-startup-id="${focusEntityId}"]` : `[data-idea-id="${focusEntityId}"]`;
        const card = focusEntityId ? document.querySelector(selector) : null;
        (card || document.getElementById(focusType === 'startup' ? 'startupList' : 'ideasList'))?.scrollIntoView({ behavior: 'smooth', block: 'start' });
        card?.classList.add('workspace-flash');

        document.getElementById('chatMessages')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }

      if (chatSubscribedTeamId !== data.team.id) {
        if (chatUnsubscribe) chatUnsubscribe();
        chatSubscribedTeamId = data.team.id;
        chatUnsubscribe = await MllyCore.subscribeTeamChat(data.team.id, async (messages) => {
          if (workspaceState) {
            workspaceState = { ...workspaceState, messages };
          }
          renderChat(messages, currentUserId);
          scheduleChatSeen(messages, currentUserId, data.team.id);
        });

      markWorkspaceNotificationsSeen(data);

      document.getElementById('sendChatBtn')?.addEventListener('click', async () => {
        const input = document.getElementById('chatText');
        const button = document.getElementById('sendChatBtn');

          button.disabled = false;

      document.getElementById('createIdeaBtn')?.addEventListener('click', async () => {

          await MllyCore.createWorkspaceEntry({

          });
          setFeedback('ideaFeedback', "G'oya qo'shildi va a'zolarga bildirishnoma yuborildi.", 'success');
          document.getElementById('ideaTitle').value = '';
          document.getElementById('ideaDescription').value = '';
          await refreshWorkspace(data.team.id, currentUserId);
        } catch (error) {
          setFeedback('ideaFeedback', error.message || "G'oya qo'shilmadi.", 'error');
          button.disabled = false;
        }
      });

      document.getElementById('createStartupBtn')?.addEventListener('click', async () => {
        const button = document.getElementById('createStartupBtn');
        setFeedback('startupFeedback', '', 'error');
        button.disabled = true;
        try {
          await MllyCore.createWorkspaceEntry({
            teamId: data.team.id,

          setFeedback('startupFeedback', error.message || "Startup qo'shilmadi.", 'error');
          button.disabled = false;

      });

      document.getElementById('inviteMemberBtn')?.addEventListener('click', async () => {
        const input = document.getElementById('memberEmail');
        const button = document.getElementById('inviteMemberBtn');
        setFeedback('memberInviteFeedback', '', 'error');
        button.disabled = true;
        try {
          await MllyCore.inviteWorkspaceMember({ teamId: data.team.id, email: input.value, role: document.getElementById('inviteRole')?.value || 'member' });

        } catch (error) {
          setFeedback('memberInviteFeedback', error.message || "Taklif yuborilmadi.", 'error');
        } finally {
          button.disabled = false;
        }
      });

      document.getElementById('createTaskBtn')?.addEventListener('click', async () => {
        const button = document.getElementById('createTaskBtn');
        setFeedback('taskCreateFeedback', '', 'error');
        button.disabled = true;
        try {
          const dependsSel = document.getElementById('taskDependsOn');
          const dependsOn = dependsSel ? Array.from(dependsSel.selectedOptions).map((o) => o.value) : [];
          await MllyCore.createTask({
            teamId: data.team.id,
            title: document.getElementById('taskTitle').value,
            description: document.getElementById('taskDescription').value,
            assignmentMode: document.getElementById('taskAssignmentMode').value || 'open',
            // FIX (complaints 8 & 9): server `assignedTo` maydonini kutyapti, klient esa
            // `assignedUserId` yuborardi — shuning uchun tayinlash tiklanmaydi va vazifa
            // har doim createdBy (lead) ga bog'lanib qolardi. Endi to'g'ri maydon yuboriladi.
