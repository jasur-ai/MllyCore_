<!DOCTYPE html>
<html lang="uz" class="auth-required">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Workspace - MllyCore</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="app">
    <div id="content" class="workspace-app"><div class="workspace-empty"><h3>Workspace yuklanmoqda</h3><p>Ma'lumotlar olinmoqda...</p></div></div>
  </div>
  <script src="js/firebase-config.js"></script>
  <script src="js/firebase-service.js"></script>
  <script src="js/auth-guard.js"></script>
  <script src="js/layout.js"></script>
  <script>
    const qs = (key) => new URLSearchParams(location.search).get(key);
    const escapeHtml = (value) => String(value || '').replace(/[&<>"']/g, (char) => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'
    }[char]));
    const fmtDate = (value) => {
      if (!value) return '';
      const date = value.toDate ? value.toDate() : new Date(value);
      return Number.isNaN(date.getTime()) ? '' : date.toLocaleString('uz-UZ');
    };
    window.UTIL = window.UTIL || {
      toast: (msg) => {
        const el = document.createElement('div');
        el.className = 'toast'; el.textContent = msg; document.body.appendChild(el);
        requestAnimationFrame(() => el.classList.add('show'));
        setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 250); }, 2200);
      }
    };

    (async () => {
      const user = await window.MLLYCORE_AUTH_READY;
      if (!user) return;
      if (window.MLLYCORE_PROFILE?.role === 'admin') {
        location.href = 'admin.html';
        return;
      }

      const dashboard = await MllyCore.getDashboardData(user.uid);
      mountLayout('', { profile: window.MLLYCORE_PROFILE, teams: dashboard.teams, notifications: dashboard.notifications });

      const teamId = qs('id');
      const data = teamId ? await MllyCore.getTeamData(teamId) : null;
      if (!data) {
        document.getElementById('content').innerHTML = '<div class="workspace-empty"><h3>Workspace topilmadi</h3><p>Siz bu workspace a\'zosi emassiz yoki workspace mavjud emas.</p></div>';
        return;
      }

      const membership = data.members.find((m) => m.userId === user.uid);
      const isLead = membership?.role === 'team_lead';
      const sortedMessages = [...data.messages].sort((a, b) => {
        const aTime = a.createdAt?.toMillis ? a.createdAt.toMillis() : 0;
        const bTime = b.createdAt?.toMillis ? b.createdAt.toMillis() : 0;
        return aTime - bTime;
      });

      document.getElementById('content').innerHTML = `
        <section class="workspace-command">
          <div>
            <h1 class="workspace-command-title">${escapeHtml(data.team.name)}</h1>
            <p class="workspace-command-copy">${escapeHtml(data.team.description || 'Workspace ichidagi g\'oya, member va chat oqimi.')}</p>
          </div>
          <div class="workspace-command-tools">
            <span class="badge badge-active">${escapeHtml(membership?.role || 'member')}</span>
            ${isLead ? `<span class="badge">${escapeHtml(data.team.secretKey || data.team.invitationCode || '-')}</span>` : ''}
          </div>
        </section>

        <section class="workspace-overview">
          <div class="workspace-stat">
            <span class="workspace-stat-label">A'zolar</span>
            <span class="workspace-stat-value">${data.members.length}</span>
            <span class="workspace-stat-note">Workspace ichidagi jamoa</span>
          </div>
          <div class="workspace-stat">
            <span class="workspace-stat-label">G'oyalar</span>
            <span class="workspace-stat-value">${data.ideas.length}</span>
            <span class="workspace-stat-note">Private idea oqimi</span>
          </div>
          <div class="workspace-stat">
            <span class="workspace-stat-label">Chat xabarlari</span>
            <span class="workspace-stat-value">${sortedMessages.length}</span>
            <span class="workspace-stat-note">Joriy suhbat tarixi</span>
          </div>
          <div class="workspace-stat">
            <span class="workspace-stat-label">Sizning rol</span>
            <span class="workspace-stat-value">${escapeHtml(membership?.role || 'member')}</span>
            <span class="workspace-stat-note">${isLead ? 'Lead access faol' : 'Focused workspace access'}</span>
          </div>
        </section>

        <section class="workspace-split-hero">
          <div class="workspace-surface pad">
            <div class="section-head"><h2>Workspace context</h2></div>
            <div class="workspace-chip-row">
              <span class="badge">Private workspace</span>
              <span class="badge">Chat enabled</span>
              <span class="badge">${isLead ? 'Secret key owner' : 'Member access'}</span>
            </div>
            <p class="muted text-sm" style="margin:14px 0 0">Bu yerda faqat shu workspace ichidagi g'oyalar, a'zolar va chat oqimi ko'rinadi. Public qidiruv yoki boshqa workspace ma'lumotlari aralashmaydi.</p>
          </div>
          <div class="workspace-action-stack">
            ${isLead ? `
              <div class="workspace-surface pad">
                <h3 style="margin:0 0 12px">Lead actions</h3>
                <div class="workspace-form-grid">
                  <div>
                    <label class="label">Yangi a'zo emaili</label>
                    <div class="workspace-form-inline">
                      <input class="input" id="memberEmail" type="email" placeholder="member@email.com">
                      <button class="btn btn-primary" id="addMemberBtn">Qo'shish</button>
                    </div>
                  </div>
                  <button class="btn btn-ghost" id="resetSecretBtn">Secret key reset</button>
                </div>
              </div>
            ` : `
              <div class="workspace-surface pad">
                <h3 style="margin:0 0 12px">Member view</h3>
                <p class="muted text-sm" style="margin:0">Siz workspace ichidagi g'oya, chat va muhokamalarni ko'rasiz. A'zo qo'shish yoki secret key reset faqat team lead uchun ochiq.</p>
              </div>
            `}
          </div>
        </section>

        <section class="workspace-layout">
          <div class="workspace-main-stack">
            <div class="workspace-surface">
              <div class="workspace-surface-head">
                <div>
                  <h2>Idea canvas</h2>
                  <div class="workspace-surface-copy">Workspace ichidagi asosiy g'oya oqimi.</div>
                </div>
                <span class="badge">${data.ideas.length} item</span>
              </div>
              <div class="workspace-card-grid cols-2">
                ${data.ideas.length ? data.ideas.map((idea) => `
                  <a href="idea.html?id=${idea.id}" class="workspace-record">
                    <div class="workspace-record-top">
                      <h3>${escapeHtml(idea.title)}</h3>
                      <span class="badge">${escapeHtml(idea.status || idea.category || '-')}</span>
                    </div>
                    <p>${escapeHtml(idea.description || 'Idea tafsiloti kiritilmagan.')}</p>
                  </a>
                `).join('') : '<div class="workspace-empty"><h3>G\'oya yoq</h3><p>Bu workspace ichida hali g\'oya yaratilmagan.</p></div>'}
              </div>
            </div>

            <div class="workspace-surface">
              <div class="workspace-surface-head">
                <div>
                  <h2>Chat stream</h2>
                  <div class="workspace-surface-copy">Realtime muhokama va jamoa activity.</div>
                </div>
              </div>
              <div class="chat">
                <div class="chat-messages" id="chatMessages">
                  ${sortedMessages.length ? sortedMessages.map((message) => `
                    <div class="msg ${message.senderUserId === user.uid ? 'me' : ''}">
                      <div class="avatar-sm avatar">${escapeHtml(message.senderAvatar || 'U')}</div>
                      <div class="bubble">
                        <div class="meta">${escapeHtml(message.senderName || 'User')} / ${fmtDate(message.createdAt)}</div>
                        <div>${escapeHtml(message.text)}</div>
                      </div>
                    </div>
                  `).join('') : '<div class="workspace-empty"><h3>Chat bo\'sh</h3><p>Birinchi xabarni yozing.</p></div>'}
                </div>
                <div class="chat-input">
                  <input class="input" id="chatText" placeholder="Xabar yozing...">
                  <button class="btn btn-primary" id="sendChatBtn">Yuborish</button>
                </div>
              </div>
            </div>
          </div>

          <aside class="workspace-side-stack">
            <div class="workspace-surface">
              <div class="workspace-surface-head">
                <div>
                  <h3>A'zolar</h3>
                  <div class="workspace-surface-copy">Workspace ichidagi role map.</div>
                </div>
                <span class="badge">${data.members.length}</span>
              </div>
              <div class="workspace-card-grid">
                ${data.members.map((member) => `
                  <div class="workspace-list-row">
                    <div class="avatar">${escapeHtml(member.user?.avatar || 'U')}</div>
                    <div class="workspace-list-copy">
                      <strong>${escapeHtml(member.user?.name || member.user?.email || member.userId)}</strong>
                      <span>${escapeHtml(member.user?.email || '')}</span>
                    </div>
                    <span class="badge">${escapeHtml(member.role)}</span>
                  </div>
                `).join('')}
              </div>
            </div>

            <div class="workspace-surface pad">
              <h3 style="margin:0 0 12px">Workspace notes</h3>
              <div class="workspace-message-stack">
                <div class="workspace-message-item">
                  <strong>Visibility</strong>
                  <span>Faqat workspace ichidagi userlar bu yer ma'lumotlarini ko'radi.</span>
                </div>
                <div class="workspace-message-item">
                  <strong>Access</strong>
                  <span>${isLead ? 'Siz team lead sifatida member va secret key oqimini boshqarasiz.' : 'Siz member sifatida focused access bilan ishlaysiz.'}</span>
                </div>
              </div>
            </div>
          </aside>
        </section>
      `;

      document.getElementById('sendChatBtn')?.addEventListener('click', async () => {
        const input = document.getElementById('chatText');
        const button = document.getElementById('sendChatBtn');
        button.disabled = true;
        try {
          await MllyCore.sendChatMessage({ teamId: data.team.id, text: input.value });
          input.value = '';
          location.reload();
        } catch (error) {
          UTIL.toast(error.message || 'Xabar yuborilmadi');
          button.disabled = false;
        }
      });

      document.getElementById('chatText')?.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') document.getElementById('sendChatBtn')?.click();
      });

      document.getElementById('addMemberBtn')?.addEventListener('click', async () => {
        const input = document.getElementById('memberEmail');
        try {
          await MllyCore.addWorkspaceMember({ teamId: data.team.id, email: input.value });
          UTIL.toast("A'zo workspace'ga qo'shildi");
          setTimeout(() => location.reload(), 700);
        } catch (error) {
          UTIL.toast(error.message || "A'zo qo'shishda xatolik yuz berdi");
        }
      });

      document.getElementById('resetSecretBtn')?.addEventListener('click', async () => {
        try {
          const key = await MllyCore.resetWorkspaceSecret(data.team.id);
          UTIL.toast(`Yangi secret key: ${key}`);
          setTimeout(() => location.reload(), 900);
        } catch (error) {
          UTIL.toast(error.message || 'Secret key resetda xatolik yuz berdi');
        }
      });
    })();
  </script>
</body>
</html>
