<!DOCTYPE html>
<html lang="uz" class="auth-required">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Workspace - MllyCore</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="app">
    <div id="content" class="workspace-app"><div class="workspace-empty loading-copy"><h3>Yuklanmoqda...</h3><p>Workspace tayyorlanmoqda.</p></div></div>
  </div>
  <script src="js/theme.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/firebase-service.js"></script>
  <script src="js/auth-guard.js"></script>
  <script src="js/layout.js"></script>
  <script>
    const qs = (key) => new URLSearchParams(location.search).get(key);
    const escapeHtml = (value) => String(value || '').replace(/[&<>"']/g, (char) => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'
    }[char]));
    const fmtDate = (value) => {
      if (!value) return '-';
      const date = value.toDate ? value.toDate() : new Date(value);
      return Number.isNaN(date.getTime()) ? '-' : date.toLocaleString('uz-UZ');
    };
    const fmtDateInput = (value) => {
      if (!value) return '';
      const date = new Date(value);
      return Number.isNaN(date.getTime()) ? '' : date.toISOString().slice(0, 16);
    };
    const focusType = qs('focus');
    const focusEntityId = qs('entity');

    window.UTIL = window.UTIL || {
      toast: (msg) => {
        const el = document.createElement('div');
        el.className = 'toast';
        el.textContent = msg;
        document.body.appendChild(el);
        requestAnimationFrame(() => el.classList.add('show'));
        setTimeout(() => {
          el.classList.remove('show');
          setTimeout(() => el.remove(), 250);
        }, 2200);
      }
    };

    let chatUnsubscribe = null;
    let workspaceState = null;
    let chatSeenSyncPending = false;
    let chatSeenTimer = null;
    let chatSubscribedTeamId = '';
    let lastWorkspaceRenderKey = '';

    function setFeedback(id, text, tone = 'error') {
      const node = document.getElementById(id);
      if (!node) return;
      node.className = `text-sm muted feedback-${tone}`;
      node.textContent = text || '';
    }

    function workspaceRenderKey(data) {
      if (!data?.team?.id) return '';
      const latestIdea = (data.ideas || [])[0];
      const latestTask = (data.tasks || [])[0];
      const latestSubmission = (data.taskSubmissions || [])[0];
      const latestMessage = (data.messages || []).length ? data.messages[data.messages.length - 1] : null;
      return [
        data.team.id,
        data.members?.length || 0,
        data.ideas?.length || 0,
        data.tasks?.length || 0,
        data.taskSubmissions?.length || 0,
        data.messages?.length || 0,
        latestIdea?.id || '',
        latestTask?.id || '',
        latestSubmission?.id || '',
        latestMessage?.id || '',
        latestMessage?.seenBy?.length || 0,
        data.team.updatedAt?.seconds || data.team.updatedAt || ''
      ].join('|');
    }

    function memberOptions(members, includeLead = true) {
      return members
        .filter((member) => includeLead || member.role !== 'team_lead')
        .map((member) => `<option value="${member.userId}">${escapeHtml(member.user?.name || member.user?.email || member.userId)}</option>`)
        .join('');
    }

    function renderChat(messages, currentUserId) {
      const target = document.getElementById('chatMessages');
      if (!target) return;
      target.innerHTML = messages.length ? messages.map((message) => `
        <div class="msg ${message.senderUserId === currentUserId ? 'me' : ''}" data-message-id="${message.id}">
          <div class="avatar-sm avatar">${escapeHtml(message.senderAvatar || 'U')}</div>
          <div class="bubble">
            <div class="meta">
              <span>${escapeHtml(message.senderName || 'User')} / ${fmtDate(message.createdAt || message.clientCreatedAt)}</span>
              ${message.senderUserId === currentUserId ? `<span class="chat-checks ${(Array.isArray(message.seenBy) && message.seenBy.length > 1) ? 'is-read' : ''}">${(Array.isArray(message.seenBy) && message.seenBy.length > 1) ? '\u2713\u2713' : '\u2713'}</span>` : ''}
            </div>
            <div>${escapeHtml(message.text)}</div>
          </div>
        </div>
      `).join('') : '<div class="chat-empty">Chat hali bo\'sh. Birinchi xabarni yozing.</div>';
      if (focusType === 'chat' && focusEntityId) {
        const focused = target.querySelector(`[data-message-id="${focusEntityId}"]`);
        if (focused) {
          focused.scrollIntoView({ behavior: 'smooth', block: 'center' });
          focused.classList.add('workspace-flash');
          setTimeout(() => focused.classList.remove('workspace-flash'), 1800);
        } else {
          target.scrollTop = target.scrollHeight;
        }
      } else {
        target.scrollTop = target.scrollHeight;
      }
      const count = document.getElementById('chatCount');
      if (count) count.textContent = messages.length;
      const stat = document.getElementById('chatStat');
      if (stat) stat.textContent = messages.length;
    }

    function canMarkChatSeen() {
      const chatBox = document.getElementById('chatMessages');
      if (!chatBox) return false;
      const rect = chatBox.getBoundingClientRect();
      const visible = rect.bottom > 100 && rect.top < (window.innerHeight || document.documentElement.clientHeight) - 40;
      return document.visibilityState === 'visible' && document.hasFocus() && visible;
    }

    async function syncChatSeen(messages, currentUserId, teamId) {
      if (chatSeenSyncPending || !teamId || !canMarkChatSeen()) return;
      const hasUnseen = (messages || []).some((message) => {
        const seenBy = Array.isArray(message.seenBy) ? message.seenBy : [];
        return message.senderUserId !== currentUserId && !seenBy.includes(currentUserId);
      });
      if (!hasUnseen) return;
      chatSeenSyncPending = true;
      try {
        await MllyCore.markTeamChatSeen(teamId);
      } catch (_) {
      } finally {
        chatSeenSyncPending = false;
      }
    }

    function scheduleChatSeen(messages, currentUserId, teamId) {
      if (chatSeenTimer) clearTimeout(chatSeenTimer);
      chatSeenTimer = setTimeout(() => {
        syncChatSeen(messages, currentUserId, teamId);
      }, 1200);
    }

    async function markWorkspaceNotificationsSeen(data) {
      const ideaIds = (data.ideas || []).map((item) => item.id);
      const taskIds = (data.tasks || []).map((item) => item.id);
      const types = ['team_message', 'task_assigned', 'task_claimed', 'task_progress', 'task_completed', 'task_auto_assigned'];

      await MllyCore.markNotificationsRead({
        teamId: data.team.id,
        relatedEntityIds: taskIds,
        types: types.filter((type) => type !== 'team_message')
      }).catch(() => {});

      await MllyCore.markNotificationsRead({
        teamId: data.team.id,
        relatedEntityIds: ideaIds,
        types: ['idea_created', 'idea_imported', 'startup_created', 'startup_owner_changed']
      }).catch(() => {});

      await MllyCore.markNotificationsRead({
        teamId: data.team.id,
        types: ['team_message']
      }).catch(() => {});
    }

    function renderMembers(data, currentUserId) {
      const target = document.getElementById('membersList');
      if (!target) return;
      target.innerHTML = data.members.map((member) => `
        <div class="workspace-list-row">
          <div class="avatar">${escapeHtml(member.user?.avatar || 'U')}</div>
          <div class="workspace-list-copy">
            <strong>${escapeHtml(member.user?.name || member.user?.email || member.userId)}</strong>
            <span>@${escapeHtml(member.user?.username || 'user')} / ${escapeHtml(member.user?.email || '')}</span>
          </div>
          <div class="workspace-stack-tight" style="justify-items:end">
            <span class="badge ${member.role === 'team_lead' ? 'badge-active' : ''}">${escapeHtml(member.role)}</span>
            ${member.userId === currentUserId ? '<span class="workspace-pill-note">Bu siz</span>' : ''}
          </div>
        </div>
      `).join('');
    }

    function renderEntries(data, currentUserId, isLead) {
      const ideas = data.ideas.filter((entry) => entry.entryType !== 'startup');
      const startups = data.ideas.filter((entry) => entry.entryType === 'startup');
      document.getElementById('ideaStat').textContent = ideas.length;
      document.getElementById('startupStat').textContent = startups.length;
      document.getElementById('ideasCount').textContent = `${ideas.length} ta`;
      document.getElementById('startupsCount').textContent = `${startups.length} ta`;

      document.getElementById('startupList').innerHTML = startups.length ? startups.map((item) => `
        <div class="workspace-record workspace-record-startup workspace-record-accent" data-startup-id="${item.id}">
          <div class="workspace-record-top">
            <div>
              <h3>${escapeHtml(item.title)}</h3>
              <div class="workspace-inline-meta">
                <span>Startup</span>
                <span>Mas'ul: ${escapeHtml(item.ownerName || 'Belgilanmagan')}</span>
              </div>
            </div>
            <span class="badge badge-active">${escapeHtml(item.status || 'Startup')}</span>
          </div>
          <p>${escapeHtml(item.description || 'Startup tafsiloti kiritilmagan.')}</p>
          ${isLead ? `
            <div class="workspace-subgrid cols-2 mt-3">
              <select class="select" data-owner-select="${item.id}">
                <option value="">Mas'ul tanlang</option>
                ${memberOptions(data.members, true)}
              </select>
              <button class="btn btn-ghost" data-owner-save="${item.id}">Mas'ulni saqlash</button>
            </div>
            <div class="text-sm muted" data-owner-feedback="${item.id}"></div>
          ` : ''}
        </div>
      `).join('') : '<div class="workspace-empty"><h3>Startup yo\'q</h3><p>Hozircha team lead startup qo\'shmagan.</p></div>';

      document.getElementById('ideasList').innerHTML = ideas.length ? ideas.map((item) => `
        <a href="idea.html?id=${item.id}" class="workspace-record workspace-record-idea" data-idea-id="${item.id}">
          <div class="workspace-record-top">
            <div>
              <h3>${escapeHtml(item.title)}</h3>
              <div class="workspace-inline-meta">
                <span>G'oya</span>
                <span>Mas'ul: ${escapeHtml(item.ownerName || item.createdByName || 'Belgilanmagan')}</span>
              </div>
            </div>
            <span class="badge">${escapeHtml(item.status || 'Raw')}</span>
          </div>
          <p>${escapeHtml(item.description || 'G\'oya tavsifi kiritilmagan.')}</p>
        </a>
      `).join('') : '<div class="workspace-empty"><h3>G\'oya yo\'q</h3><p>Workspace ichida hali g\'oya yaratilmagan.</p></div>';

      document.querySelectorAll('[data-owner-save]').forEach((button) => {
        button.addEventListener('click', async () => {
          const ideaId = button.dataset.ownerSave;
          const ownerUserId = document.querySelector(`[data-owner-select="${ideaId}"]`)?.value;
          const feedback = document.querySelector(`[data-owner-feedback="${ideaId}"]`);
          if (feedback) {
            feedback.className = 'text-sm muted feedback-error';
            feedback.textContent = '';
          }
          button.disabled = true;
          try {
            await MllyCore.updateStartupOwner({ teamId: data.team.id, ideaId, ownerUserId });
            if (feedback) {
              feedback.className = 'text-sm muted feedback-success';
              feedback.textContent = "Mas'ul yangilandi.";
            }
            await refreshWorkspace(data.team.id, currentUserId);
          } catch (error) {
            if (feedback) feedback.textContent = error.message || "Mas'ul yangilanmadi.";
            button.disabled = false;
          }
        });
      });
    }

    function renderTasks(data, currentUserId, isLead) {
      const tasks = data.tasks || [];
      const submissions = data.taskSubmissions || [];
      const memberCount = data.members.length || 1;
      const target = document.getElementById('tasksList');
      const count = document.getElementById('taskCount');
      if (count) count.textContent = `${tasks.length} ta`;

      target.innerHTML = tasks.length ? tasks.map((task) => {
        const taskSubs = submissions.filter((item) => item.taskId === task.id);
        const hasSubmitted = taskSubs.some((item) => item.userId === currentUserId);
        const isAssignedToCurrent = task.assignedUserId === currentUserId;
        const canClaim = task.assignmentMode === 'open' && !task.assignedUserId;
        const teamRequired = task.requiredCount || Math.max(1, Math.ceil(memberCount * 0.65));
        const canSubmit = (
          (task.assignmentMode === 'team') ||
          ((task.assignmentMode === 'direct' || task.assignmentMode === 'open') && isAssignedToCurrent)
        ) && !hasSubmitted && task.status !== 'completed';

        return `
          <div class="workspace-task-card" data-task-id="${task.id}">
            <div class="workspace-task-head">
              <div>
                <h3 style="margin:0">${escapeHtml(task.title)}</h3>
                <div class="workspace-task-meta">
                  <span class="badge">${escapeHtml(task.assignmentMode || 'open')}</span>
                  <span class="badge">${escapeHtml(task.status || 'open')}</span>
                  <span class="badge">Deadline: ${escapeHtml(task.deadlineAt ? fmtDate(task.deadlineAt) : 'yo\'q')}</span>
                </div>
              </div>
              <span class="badge badge-progress">${task.assignmentMode === 'team' ? `${task.progressCount || 0}/${memberCount} kishi` : `${task.progressCount || 0}/${task.requiredCount || 1}`}</span>
            </div>
            <p class="workspace-helper">${escapeHtml(task.description || 'Tavsif kiritilmagan.')}</p>
            <div class="workspace-detail-list">
              <div class="workspace-detail-row"><span>Mas'ul</span><strong>${escapeHtml(task.assignedUserName || (task.assignmentMode === 'team' ? 'Jamoaviy' : 'Hali olinmagan'))}</strong></div>
              <div class="workspace-detail-row"><span>Yaratuvchi</span><strong>${escapeHtml(task.createdByName || 'User')}</strong></div>
              ${task.assignmentMode === 'team' ? `<div class="workspace-detail-row"><span>Progress</span><strong>${task.progressCount || 0}/${memberCount} kishi bajardi (threshold: ${teamRequired})</strong></div>` : ''}
            </div>
            ${taskSubs.length ? `
              <div class="workspace-message-stack">
                ${taskSubs.map((sub) => `
                  <div class="workspace-message-item">
                    <strong>${escapeHtml(sub.userName)}</strong>
                    <span>${escapeHtml(sub.resultText)}</span>
                    ${sub.resultLink ? `<a class="text-sm" href="${escapeHtml(sub.resultLink)}" target="_blank" rel="noopener noreferrer" style="color:#7dd3fc;margin-top:8px;display:inline-flex">Linkni ochish</a>` : ''}
                  </div>
                `).join('')}
              </div>
            ` : ''}
            <div class="workspace-task-footer">
              ${canClaim ? `<button class="btn btn-ghost" data-task-claim="${task.id}">Topshiriqni olish</button>` : '<span class="workspace-helper">Topshiriq oqimi faol</span>'}
              ${canSubmit ? `
                <div class="workspace-task-submit-grid" style="flex:1">
                  <input class="input" data-task-result="${task.id}" placeholder="Natijani yozing">
                  <input class="input" data-task-link="${task.id}" placeholder="Pitch yoki ish linki">
                  <button class="btn btn-primary" data-task-submit="${task.id}">Tugatdim</button>
                </div>
              ` : ''}
            </div>
            <div class="text-sm muted" data-task-feedback="${task.id}"></div>
          </div>
        `;
      }).join('') : '<div class="workspace-empty"><h3>Topshiriq yo\'q</h3><p>Lead yoki jamoa yangi topshiriq qo\'shganda shu yerda ko\'rinadi.</p></div>';

      document.querySelectorAll('[data-task-claim]').forEach((button) => {
        button.addEventListener('click', async () => {
          const taskId = button.dataset.taskClaim;
          const feedback = document.querySelector(`[data-task-feedback="${taskId}"]`);
          if (feedback) {
            feedback.className = 'text-sm muted feedback-error';
            feedback.textContent = '';
          }
          button.disabled = true;
          try {
            await MllyCore.claimOpenTask(taskId);
            await refreshWorkspace(data.team.id, currentUserId);
          } catch (error) {
            if (feedback) feedback.textContent = error.message || 'Topshiriq olinmadi.';
            button.disabled = false;
          }
        });
      });

      document.querySelectorAll('[data-task-submit]').forEach((button) => {
        button.addEventListener('click', async () => {
          const taskId = button.dataset.taskSubmit;
          const resultText = document.querySelector(`[data-task-result="${taskId}"]`)?.value || '';
          const resultLink = document.querySelector(`[data-task-link="${taskId}"]`)?.value || '';
          const feedback = document.querySelector(`[data-task-feedback="${taskId}"]`);
          if (feedback) {
            feedback.className = 'text-sm muted feedback-error';
            feedback.textContent = '';
          }
          button.disabled = true;
          try {
            await MllyCore.submitTaskResult({ taskId, resultText, resultLink });
            await refreshWorkspace(data.team.id, currentUserId);
          } catch (error) {
            if (feedback) feedback.textContent = error.message || 'Natija yuborilmadi.';
            button.disabled = false;
          }
        });
      });

      if (isLead) {
        const assignmentMode = document.getElementById('taskAssignmentMode');
        const assigneeWrap = document.getElementById('taskAssigneeWrap');
        const toggleAssignee = () => {
          if (!assignmentMode || !assigneeWrap) return;
          assigneeWrap.style.display = assignmentMode.value === 'direct' ? '' : 'none';
        };
        assignmentMode?.addEventListener('change', toggleAssignee);
        toggleAssignee();
      }
    }

    async function renderWorkspace(data, currentUserId) {
      const membership = data.members.find((member) => member.userId === currentUserId);
      const isLead = membership?.role === 'team_lead';
      lastWorkspaceRenderKey = workspaceRenderKey(data);

      document.getElementById('content').innerHTML = `
        <section class="workspace-command">
          <div>
            <h1 class="workspace-command-title">${escapeHtml(data.team.name)}</h1>
            <p class="workspace-command-copy">${escapeHtml(data.team.description || 'Workspace ichidagi idea, startup, task va chat oqimi.')}</p>
          </div>
          <div class="workspace-command-tools">
            <a class="btn btn-secondary btn-sm" href="reports.html?teamId=${data.team.id}">📋 Hisobotlar</a>
            <span class="badge badge-active">${escapeHtml(membership?.role || 'member')}</span>
            ${isLead ? `<span class="badge">${escapeHtml(data.team.secretKey || data.team.invitationCode || '-')}</span>` : ''}
          </div>
        </section>

        <section class="workspace-overview">
          <div class="workspace-stat">
            <span class="workspace-stat-label">A'zolar</span>
            <span class="workspace-stat-value">${data.members.length}</span>
            <span class="workspace-stat-note">Workspace ichidagi jamoa</span>
          </div>
          <div class="workspace-stat">
            <span class="workspace-stat-label">G'oyalar</span>
            <span class="workspace-stat-value" id="ideaStat">0</span>
            <span class="workspace-stat-note">Hamma a'zolar qo'sha oladi</span>
          </div>
          <div class="workspace-stat">
            <span class="workspace-stat-label">Startuplar</span>
            <span class="workspace-stat-value" id="startupStat">0</span>
            <span class="workspace-stat-note">Faqat team lead qo'shadi</span>
          </div>
          <div class="workspace-stat">
            <span class="workspace-stat-label">Chat</span>
            <span class="workspace-stat-value" id="chatStat">${data.messages.length}</span>
            <span class="workspace-stat-note">Realtime oqim</span>
          </div>
        </section>

        <section class="workspace-split-hero">
          <div class="workspace-surface pad">
            <div class="section-head"><h2>Workspace context</h2></div>
            <div class="workspace-chip-row">
              <span class="badge">Private workspace</span>
              <span class="badge">Realtime chat</span>
              <span class="badge">${isLead ? 'Lead control' : 'Member access'}</span>
            </div>
            <p class="muted text-sm" style="margin:14px 0 0">A'zo taklif qilinsa userga bildirishnoma tushadi, u secret key to'g'ri kiritsa keyingina kiradi. Chat, idea, startup va task activity hamma a'zolarga bildirishnoma yuboradi.</p>
          </div>
          <div class="workspace-action-stack">
            ${isLead ? `
              <div class="workspace-surface pad">
                <h3 style="margin:0 0 12px">Lead actions</h3>
                <div class="workspace-form-stack">
                  <div>
                    <label class="label">Yangi a'zo emaili</label>
                    <div class="workspace-form-inline">
                      <input class="input" id="memberEmail" type="email" placeholder="member@email.com">
                      <button class="btn btn-primary" id="inviteMemberBtn">Taklif yuborish</button>
                    </div>
                    <div class="text-sm muted" id="memberInviteFeedback"></div>
                  </div>
                  <button class="btn btn-ghost" id="resetSecretBtn">Secret key reset</button>
                </div>
              </div>
            ` : `
              <div class="workspace-surface pad">
                <h3 style="margin:0 0 12px">Member view</h3>
                <p class="muted text-sm" style="margin:0">Siz g'oya qo'sha olasiz, jamoaviy taskga natija yuklaysiz va chatda ishlaysiz.</p>
              </div>
            `}
          </div>
        </section>

        <section class="workspace-layout">
          <div class="workspace-main-stack">
            ${isLead ? `
              <div class="workspace-surface">
                <div class="workspace-surface-head">
                  <div>
                    <h2>Startup qo'shish</h2>
                    <div class="workspace-surface-copy">Startup faqat team lead tomonidan qo'shiladi.</div>
                  </div>
                  <span class="badge badge-active">Lead only</span>
                </div>
                <div class="workspace-surface-body compact">
                  <div class="workspace-form-stack">
                    <div>
                      <label class="label">Startup nomi</label>
                      <input class="input" id="startupTitle" placeholder="Masalan: MllyCore Mobile">
                    </div>
                    <div>
                      <label class="label">Tavsif</label>
                      <textarea class="textarea" id="startupDescription" rows="3" placeholder="Startup nima qiladi?"></textarea>
                    </div>
                    <div>
                      <label class="label">Mas'ul shaxs</label>
                      <select class="select" id="startupOwnerUserId">
                        <option value="">Keyinroq belgilanadi</option>
                        ${memberOptions(data.members, true)}
                      </select>
                    </div>
                    <div class="workspace-form-actions">
                      <button class="btn btn-primary" id="createStartupBtn">Startup qo'shish</button>
                    </div>
                    <div class="text-sm muted" id="startupFeedback"></div>
                  </div>
                </div>
              </div>
            ` : ''}

            <div class="workspace-surface">
              <div class="workspace-surface-head">
                <div>
                  <h2>G'oya qo'shish</h2>
                  <div class="workspace-surface-copy">Har bir a'zo yangi g'oya kiritishi mumkin.</div>
                </div>
                <span class="badge">Open to all</span>
              </div>
              <div class="workspace-surface-body compact">
                <div class="workspace-form-stack">
                  <div>
                    <label class="label">G'oya nomi</label>
                    <input class="input" id="ideaTitle" placeholder="Masalan: AI matching flow">
                  </div>
                  <div>
                    <label class="label">Tavsif</label>
                    <textarea class="textarea" id="ideaDescription" rows="3" placeholder="G'oyaning qisqa tavsifi"></textarea>
                  </div>
                  <div class="workspace-form-actions">
                    <button class="btn btn-primary" id="createIdeaBtn">G'oya qo'shish</button>
                  </div>
                  <div class="text-sm muted" id="ideaFeedback"></div>
                </div>
              </div>
            </div>

            <div class="workspace-surface">
              <div class="workspace-surface-head">
                <div>
                  <h2>Topshiriqlar</h2>
                  <div class="workspace-surface-copy">Umumiy, individual va jamoaviy topshiriqlar.</div>
                </div>
                <span class="badge" id="taskCount">0 ta</span>
              </div>
              <div class="workspace-surface-body compact">
                ${isLead ? `
                  <div class="workspace-form-stack" style="margin-bottom:16px">
                    <div>
                      <label class="label">Topshiriq nomi</label>
                      <input class="input" id="taskTitle" placeholder="Masalan: Investor pitch tayyorlash">
                    </div>
                    <div>
                      <label class="label">Tavsif</label>
                      <textarea class="textarea" id="taskDescription" rows="2" placeholder="Topshiriq tafsiloti"></textarea>
                    </div>
                    <div class="workspace-subgrid cols-2">
                      <div>
                        <label class="label">Topshiriq turi</label>
                        <select class="select" id="taskAssignmentMode">
                          <option value="open">Umumiy</option>
                          <option value="direct">Bir kishiga</option>
                          <option value="team">Jamoaviy</option>
                        </select>
                      </div>
                      <div id="taskAssigneeWrap">
                        <label class="label">Mas'ul</label>
                        <select class="select" id="taskAssignedUserId">
                          <option value="">A'zo tanlang</option>
                          ${memberOptions(data.members, true)}
                        </select>
                      </div>
                    </div>
                    <div>
                      <label class="label">Deadline</label>
                      <input class="input" id="taskDeadline" type="datetime-local" value="${fmtDateInput(new Date(Date.now() + 24 * 60 * 60 * 1000))}">
                    </div>
                    <div class="workspace-form-actions">
                      <button class="btn btn-primary" id="createTaskBtn">Topshiriq qo'shish</button>
                    </div>
                    <div class="text-sm muted" id="taskCreateFeedback"></div>
                  </div>
                ` : `
                  <div class="workspace-note-bar" style="margin-bottom:16px">Jamoaviy topshiriqqa natija yuklashingiz mumkin. Umumiy topshiriqni esa olib keyin tugatishingiz mumkin.</div>
                `}
                <div class="workspace-stack-tight" id="tasksList"></div>
              </div>
            </div>

            <div class="workspace-surface">
              <div class="workspace-surface-head">
                <div>
                  <h2>Startup layer</h2>
                  <div class="workspace-surface-copy">Team lead ochgan startup yozuvlari.</div>
                </div>
                <span class="badge" id="startupsCount">0 ta</span>
              </div>
              <div class="workspace-card-grid cols-2" id="startupList"></div>
            </div>

            <div class="workspace-surface">
              <div class="workspace-surface-head">
                <div>
                  <h2>Idea canvas</h2>
                  <div class="workspace-surface-copy">Workspace ichidagi umumiy g'oya oqimi.</div>
                </div>
                <span class="badge" id="ideasCount">0 ta</span>
              </div>
              <div class="workspace-card-grid cols-2" id="ideasList"></div>
            </div>

            <div class="workspace-surface">
              <div class="workspace-surface-head">
                <div>
                  <h2>Chat stream</h2>
                  <div class="workspace-surface-copy">Realtime muhokama va jamoa activity.</div>
                </div>
                <span class="badge" id="chatCount">${data.messages.length}</span>
              </div>
              <div class="chat">
                <div class="chat-messages" id="chatMessages"></div>
                <div class="chat-input">
                  <input class="input" id="chatText" placeholder="Xabar yozing...">
                  <button class="btn btn-primary" id="sendChatBtn">Yuborish</button>
                </div>
              </div>
            </div>
          </div>

          <aside class="workspace-side-stack">
            <div class="workspace-surface">
              <div class="workspace-surface-head">
                <div>
                  <h3>Members</h3>
                  <div class="workspace-surface-copy">Ism, username, email va role xaritasi.</div>
                </div>
                <span class="badge">${data.members.length}</span>
              </div>
              <div class="workspace-card-grid" id="membersList"></div>
            </div>

            <div class="workspace-surface pad">
              <h3 style="margin:0 0 12px">Workspace notes</h3>
              <div class="workspace-message-stack">
                <div class="workspace-message-item">
                  <strong>Invite flow</strong>
                  <span>Taklif olgan user avval secret keyni to'g'ri kiritishi kerak.</span>
                </div>
                <div class="workspace-message-item">
                  <strong>Startup policy</strong>
                  <span>Startup faqat team lead tomonidan qo'shiladi. Mas'ul keyin ham o'zgartiriladi.</span>
                </div>
                <div class="workspace-message-item">
                  <strong>Task policy</strong>
                  <span>Natija yozilmasa "Tugatdim" ishlamaydi. 12 soat ichida olinmagan umumiy topshiriq avtomatik biriktiriladi.</span>
                </div>
              </div>
            </div>
          </aside>
        </section>
      `;

      renderEntries(data, currentUserId, isLead);
      renderTasks(data, currentUserId, isLead);
      renderMembers(data, currentUserId);
      renderChat(data.messages || [], currentUserId);
      scheduleChatSeen(data.messages || [], currentUserId, data.team.id);

      if (focusType === 'tasks') {
        const taskCard = focusEntityId ? document.querySelector(`[data-task-id="${focusEntityId}"]`) : null;
        (taskCard || document.getElementById('tasksList'))?.scrollIntoView({ behavior: 'smooth', block: 'start' });
        taskCard?.classList.add('workspace-flash');
        setTimeout(() => taskCard?.classList.remove('workspace-flash'), 1800);
      } else if (focusType === 'ideas' || focusType === 'startup') {
        const selector = focusType === 'startup' ? `[data-startup-id="${focusEntityId}"]` : `[data-idea-id="${focusEntityId}"]`;
        const card = focusEntityId ? document.querySelector(selector) : null;
        (card || document.getElementById(focusType === 'startup' ? 'startupList' : 'ideasList'))?.scrollIntoView({ behavior: 'smooth', block: 'start' });
        card?.classList.add('workspace-flash');
        setTimeout(() => card?.classList.remove('workspace-flash'), 1800);
      } else if (focusType === 'chat') {
        document.getElementById('chatMessages')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }

      if (chatSubscribedTeamId !== data.team.id) {
        if (chatUnsubscribe) chatUnsubscribe();
        chatSubscribedTeamId = data.team.id;
        chatUnsubscribe = await MllyCore.subscribeTeamChat(data.team.id, async (messages) => {
          if (workspaceState) {
            workspaceState = { ...workspaceState, messages };
          }
          renderChat(messages, currentUserId);
          scheduleChatSeen(messages, currentUserId, data.team.id);
        });
      }
      markWorkspaceNotificationsSeen(data);

      document.getElementById('sendChatBtn')?.addEventListener('click', async () => {
        const input = document.getElementById('chatText');
        const button = document.getElementById('sendChatBtn');
        button.disabled = true;
        try {
          await MllyCore.sendChatMessage({ teamId: data.team.id, text: input.value });
          input.value = '';
        } catch (error) {
          UTIL.toast(error.message || 'Xabar yuborilmadi');
        } finally {
          button.disabled = false;
          input.focus();
        }
      });

      document.getElementById('chatText')?.addEventListener('keydown', (event) => {
        if (event.key === 'Enter' && !event.shiftKey) {
          event.preventDefault();
          document.getElementById('sendChatBtn')?.click();
        }
      });

      document.getElementById('createIdeaBtn')?.addEventListener('click', async () => {
        const button = document.getElementById('createIdeaBtn');
        setFeedback('ideaFeedback', '', 'error');
        button.disabled = true;
        try {
          await MllyCore.createWorkspaceEntry({
            teamId: data.team.id,
            type: 'idea',
            title: document.getElementById('ideaTitle').value,
            description: document.getElementById('ideaDescription').value
          });
          setFeedback('ideaFeedback', "G'oya qo'shildi va a'zolarga bildirishnoma yuborildi.", 'success');
          document.getElementById('ideaTitle').value = '';
          document.getElementById('ideaDescription').value = '';
          await refreshWorkspace(data.team.id, currentUserId);
        } catch (error) {
          setFeedback('ideaFeedback', error.message || "G'oya qo'shilmadi.", 'error');
          button.disabled = false;
        }
      });

      document.getElementById('createStartupBtn')?.addEventListener('click', async () => {
        const button = document.getElementById('createStartupBtn');
        setFeedback('startupFeedback', '', 'error');
        button.disabled = true;
        try {
          await MllyCore.createWorkspaceEntry({
            teamId: data.team.id,
            type: 'startup',
            title: document.getElementById('startupTitle').value,
            description: document.getElementById('startupDescription').value,
            ownerUserId: document.getElementById('startupOwnerUserId').value
          });
          setFeedback('startupFeedback', "Startup qo'shildi va a'zolarga bildirishnoma yuborildi.", 'success');
          document.getElementById('startupTitle').value = '';
          document.getElementById('startupDescription').value = '';
          document.getElementById('startupOwnerUserId').value = '';
          await refreshWorkspace(data.team.id, currentUserId);
        } catch (error) {
          setFeedback('startupFeedback', error.message || "Startup qo'shilmadi.", 'error');
          button.disabled = false;
        }
      });

      document.getElementById('inviteMemberBtn')?.addEventListener('click', async () => {
        const input = document.getElementById('memberEmail');
        const button = document.getElementById('inviteMemberBtn');
        setFeedback('memberInviteFeedback', '', 'error');
        button.disabled = true;
        try {
          await MllyCore.inviteWorkspaceMember({ teamId: data.team.id, email: input.value });
          setFeedback('memberInviteFeedback', "Taklif yuborildi. User secret key orqali qo'shiladi.", 'success');
          input.value = '';
        } catch (error) {
          setFeedback('memberInviteFeedback', error.message || "Taklif yuborilmadi.", 'error');
        } finally {
          button.disabled = false;
        }
      });

      document.getElementById('createTaskBtn')?.addEventListener('click', async () => {
        const button = document.getElementById('createTaskBtn');
        setFeedback('taskCreateFeedback', '', 'error');
        button.disabled = true;
        try {
          await MllyCore.createTask({
            teamId: data.team.id,
            title: document.getElementById('taskTitle').value,
            description: document.getElementById('taskDescription').value,
            assignmentMode: document.getElementById('taskAssignmentMode').value,
            assignedUserId: document.getElementById('taskAssignedUserId')?.value || '',
            deadline: document.getElementById('taskDeadline').value
          });
          setFeedback('taskCreateFeedback', "Topshiriq qo'shildi.", 'success');
          document.getElementById('taskTitle').value = '';
          document.getElementById('taskDescription').value = '';
          await refreshWorkspace(data.team.id, currentUserId);
        } catch (error) {
          setFeedback('taskCreateFeedback', error.message || "Topshiriq qo'shilmadi.", 'error');
          button.disabled = false;
        }
      });

      document.getElementById('resetSecretBtn')?.addEventListener('click', async () => {
        const button = document.getElementById('resetSecretBtn');
        button.disabled = true;
        try {
          const key = await MllyCore.resetWorkspaceSecret(data.team.id);
          UTIL.toast(`Yangi secret key: ${key}`);
          await refreshWorkspace(data.team.id, currentUserId);
        } catch (error) {
          UTIL.toast(error.message || 'Secret key resetda xatolik yuz berdi');
          button.disabled = false;
        }
      });
    }

    async function refreshWorkspace(teamId, currentUserId) {
      const cached = await MllyCore.getTeamData(teamId);
      if (cached) {
        workspaceState = cached;
        const cachedKey = workspaceRenderKey(cached);
        if (cachedKey !== lastWorkspaceRenderKey) {
          await renderWorkspace(workspaceState, currentUserId);
        }
      }

      await MllyCore.syncTeamTasks(teamId).catch(() => {});
      const fresh = await MllyCore.getTeamData(teamId, { forceFresh: true }).catch(() => null);
      if (fresh) {
        workspaceState = fresh;
        const freshKey = workspaceRenderKey(fresh);
        if (freshKey !== lastWorkspaceRenderKey) {
          await renderWorkspace(workspaceState, currentUserId);
        }
      }
    }

    (async () => {
      const user = await window.MLLYCORE_AUTH_READY;
      if (!user) return;
      if (window.MLLYCORE_PROFILE?.role === 'admin') {
        location.href = 'admin.html';
        return;
      }

      const teamId = qs('id');
      MllyCore.syncTeamTasks(teamId).catch(() => {});
      const [dashboard, initialWorkspace] = await Promise.all([
        MllyCore.getDashboardData(user.uid),
        teamId ? MllyCore.getTeamData(teamId) : Promise.resolve(null)
      ]);
      mountLayout('', { profile: window.MLLYCORE_PROFILE, teams: dashboard.teams, notifications: dashboard.notifications });
      workspaceState = initialWorkspace;
      if (!workspaceState) {
        document.getElementById('content').innerHTML = '<div class="workspace-empty"><h3>Workspace topilmadi</h3><p>Siz bu workspace a\'zosi emassiz yoki workspace mavjud emas.</p></div>';
        return;
      }
      await renderWorkspace(workspaceState, user.uid);
    })();

    window.addEventListener('beforeunload', () => {
      if (typeof chatUnsubscribe === 'function') chatUnsubscribe();
      if (chatSeenTimer) clearTimeout(chatSeenTimer);
    });

    window.addEventListener('focus', () => {
      if (workspaceState?.messages?.length && workspaceState?.team?.id && window.MLLYCORE_AUTH_USER?.uid) {
        scheduleChatSeen(workspaceState.messages, window.MLLYCORE_AUTH_USER.uid, workspaceState.team.id);
      }
    });
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible' && workspaceState?.messages?.length && workspaceState?.team?.id && window.MLLYCORE_AUTH_USER?.uid) {
        scheduleChatSeen(workspaceState.messages, window.MLLYCORE_AUTH_USER.uid, workspaceState.team.id);
      }
    });
  </script>
