<!DOCTYPE html>
<html lang="uz" class="auth-required">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Workspace - MllyCore</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="app">
    <div id="content" class="card"><p class="muted">Workspace yuklanmoqda...</p></div>
  </div>
  <script src="js/firebase-config.js"></script>
  <script src="js/firebase-service.js"></script>
  <script src="js/auth-guard.js"></script>
  <script src="js/layout.js"></script>
  <script>
    const qs = (key) => new URLSearchParams(location.search).get(key);
    window.UTIL = window.UTIL || { toast: (msg) => alert(msg) };
    (async () => {
      const user = await window.MLLYCORE_AUTH_READY;
      if (!user) return;
      const dashboard = await MllyCore.getDashboardData(user.uid);
      mountLayout('', { profile: window.MLLYCORE_PROFILE, teams: dashboard.teams, notifications: dashboard.notifications });

      const teamId = qs('id');
      const data = teamId ? await MllyCore.getTeamData(teamId) : null;
      if (!data) {
        document.getElementById('content').innerHTML = "<h1 class=\"page-title\">Workspace topilmadi</h1><p class=\"muted\">Siz bu workspace a'zosi emassiz yoki workspace mavjud emas.</p>";
        return;
      }
      const isLead = data.members.some((m) => m.userId === user.uid && ['team_lead', 'admin'].includes(m.role)) || window.MLLYCORE_PROFILE?.role === 'admin';
      document.getElementById('content').innerHTML = `
        <div class="topbar">
          <div>
            <h1 class="page-title">${data.team.name}</h1>
            <p class="page-subtitle">${data.team.description || ''}</p>
            <div class="status-strip"><span class="badge">${data.members.length} a'zo</span><span class="badge">${data.ideas.length} g'oya</span></div>
          </div>
          <div class="action-bar">
            ${isLead ? `<button class="btn btn-ghost" id="inviteMemberBtn">A'zo taklif qilish</button><button class="btn btn-primary" id="resetSecretBtn">Secret key reset</button>` : ''}
          </div>
        </div>
        <div class="tabs"><div class="tab active">G'oyalar</div><div class="tab">A'zolar</div><div class="tab">Chat</div></div>
        <div class="grid grid-2 mt-4">
          <div class="card">
            <h3 style="margin-top:0">G'oyalar</h3>
            ${data.ideas.length ? data.ideas.map(i => `<a href="idea.html?id=${i.id}" class="kanban-card" style="display:block"><div class="font-semibold">${i.title}</div><div class="text-xs muted">${i.status || i.category || '-'}</div></a>`).join('') : "<p class=\"muted\">Hozircha g'oya yoq.</p>"}
          </div>
          <div class="card">
            <h3 style="margin-top:0">A'zolar</h3>
            ${data.members.length ? data.members.map(m => `<div class="flex items-center justify-between mb-3"><div><div class="font-semibold text-sm">${m.user?.name || m.userId}</div><div class="text-xs muted">${m.user?.email || ''}</div></div><span class="badge">${m.role}</span></div>`).join('') : "<p class=\"muted\">A'zo yoq.</p>"}
          </div>
        </div>
      `;
      if (isLead) {
        document.getElementById('inviteMemberBtn').addEventListener('click', async () => {
          const email = prompt("Qo'shiladigan a'zo emailini kiriting:");
          if (!email) return;
          try {
            await MllyCore.addWorkspaceMember({ teamId: data.team.id, email });
            UTIL.toast("A'zo workspace'ga qo'shildi");
            setTimeout(() => location.reload(), 700);
          } catch (error) {
            UTIL.toast(error.message || "A'zo qo'shishda xatolik yuz berdi");
          }
        });
        document.getElementById('resetSecretBtn').addEventListener('click', async () => {
          try {
            const key = await MllyCore.resetWorkspaceSecret(data.team.id);
            UTIL.toast(`Yangi secret key: ${key}`);
          } catch (error) {
            UTIL.toast(error.message || 'Secret key resetda xatolik yuz berdi');
          }
        });
      }
    })();
  </script>
</body>
</html>
