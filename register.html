<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ro'yxatdan o'tish — Startap Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="auth-wrap">
    <aside class="auth-side">
      <a href="index.html" class="brand">
        <div class="brand-logo">S</div>
        <div class="brand-name">Startap Hub</div>
      </a>
      <div>
        <h2 style="font-size:32px;font-weight:800;line-height:1.15">Bepul akkaunt yarating va birinchi jamoangizni quring.</h2>
        <ul class="muted mt-4" style="font-size:14px;line-height:2;list-style:none;padding:0">
          <li>+ Cheksiz g'oyalar</li>
          <li>+ Real-time jamoa chati</li>
          <li>+ Vazifa va resurs boshqaruvi</li>
          <li>+ 16 raqamli xavfsiz invite kod</li>
        </ul>
      </div>
      <div class="text-sm muted">© 2025 Startap Hub</div>
    </aside>
    <section class="auth-form">
      <div class="auth-form-inner">
        <h1 style="font-size:26px;font-weight:700;margin:0 0 6px">Akkaunt yaratish</h1>
        <p class="muted text-sm mb-4">30 soniyada boshlang.</p>
        <form onsubmit="event.preventDefault(); alert('Tasdiqlash havolasi email manzilingizga yuborildi (demo).'); location.href='login.html'">
          <div class="grid grid-2" style="gap:12px">
            <div><label class="label">Ism</label><input class="input" required placeholder="Aziz"></div>
            <div><label class="label">Familiya</label><input class="input" required placeholder="Karimov"></div>
          </div>
          <div class="mt-3"><label class="label">Username</label><input class="input" required placeholder="aziz_dev"></div>
          <div class="mt-3"><label class="label">Email</label><input class="input" type="email" required></div>
          <div class="grid grid-2 mt-3" style="gap:12px">
            <div><label class="label">Parol</label><input class="input" type="password" required placeholder="kamida 8 ta belgi"></div>
            <div><label class="label">Parolni takrorlang</label><input class="input" type="password" required></div>
          </div>
          <label class="flex items-center gap-2 text-sm muted mt-3 mb-3"><input type="checkbox" required> Foydalanish shartlariga roziman</label>
          <button class="btn btn-primary w-full" type="submit">Ro'yxatdan o'tish</button>
        </form>
        <hr class="sep">
        <p class="text-sm muted" style="text-align:center">Akkauntingiz bormi? <a href="login.html" style="color:#a5b4fc;font-weight:600">Kirish</a></p>
      </div>
    </section>
  </div>
</body>
</html>
