<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ro'yxatdan o'tish - MllyCore</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="auth-wrap">
    <aside class="auth-side">
      <a href="index.html" class="brand">
        <div class="brand-logo">M</div>
        <div class="brand-name">MllyCore</div>
      </a>
      <div>
        <h2 style="font-size:32px;font-weight:800;line-height:1.15">Bepul akkaunt yarating va birinchi jamoangizni quring.</h2>
        <ul class="muted mt-4" style="font-size:14px;line-height:2;list-style:none;padding:0">
          <li>+ Cheksiz g'oyalar</li>
          <li>+ Real-time jamoa chati</li>
          <li>+ Vazifa va resurs boshqaruvi</li>
          <li>+ 16 raqamli xavfsiz invite kod</li>
        </ul>
      </div>
      <div class="text-sm muted">2026 MllyCore</div>
    </aside>
    <section class="auth-form">
      <div class="auth-form-inner">
        <h1 style="font-size:26px;font-weight:700;margin:0 0 6px">Akkaunt yaratish</h1>
        <p class="muted text-sm mb-4">30 soniyada boshlang.</p>
        <form id="registerForm">
          <div class="grid grid-2" style="gap:12px">
            <div><label class="label">Ism</label><input class="input" id="firstName" required placeholder="Aziz"></div>
            <div><label class="label">Familiya</label><input class="input" id="lastName" required placeholder="Karimov"></div>
          </div>
          <div class="mt-3"><label class="label">Username</label><input class="input" id="username" required placeholder="aziz_dev"></div>
          <div class="mt-3"><label class="label">Email</label><input class="input" id="email" type="email" required></div>
          <div class="grid grid-2 mt-3" style="gap:12px">
            <div><label class="label">Parol</label><input class="input" id="password" type="password" required minlength="8" placeholder="kamida 8 ta belgi"></div>
            <div><label class="label">Parolni takrorlang</label><input class="input" id="passwordConfirm" type="password" required minlength="8"></div>
          </div>
          <label class="flex items-center gap-2 text-sm muted mt-3 mb-3"><input type="checkbox" required> Foydalanish shartlariga roziman</label>
          <button class="btn btn-primary w-full" type="submit">Ro'yxatdan o'tish</button>
          <p class="text-sm muted" id="authMessage" style="min-height:20px;margin:12px 0 0"></p>
        </form>
        <hr class="sep">
        <p class="text-sm muted" style="text-align:center">Akkauntingiz bormi? <a href="login.html" style="color:#a5b4fc;font-weight:600">Kirish</a></p>
      </div>
    </section>
  </div>
  <script src="js/firebase-config.js"></script>
  <script src="js/firebase-service.js"></script>
  <script>
    document.getElementById('registerForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      const message = document.getElementById('authMessage');
      const password = document.getElementById('password').value;
      const passwordConfirm = document.getElementById('passwordConfirm').value;

      if (password !== passwordConfirm) {
        message.textContent = 'Parollar bir xil emas.';
        return;
      }

      try {
        if (window.MLLYCORE_FIREBASE_ENABLED) {
          message.textContent = 'Akkaunt Firebase Auth orqali yaratilmoqda...';
          await window.MllyCore.register({
            firstName: document.getElementById('firstName').value.trim(),
            lastName: document.getElementById('lastName').value.trim(),
            username: document.getElementById('username').value.trim(),
            email: document.getElementById('email').value.trim(),
            password
          });
          message.textContent = 'Tasdiqlash havolasi email manzilingizga yuborildi.';
        } else {
          message.textContent = 'Firebase sozlanmagan. Iltimos, administratorga murojaat qiling.';
          return;
        }
        setTimeout(() => { location.href = 'login.html'; }, 900);
      } catch (error) {
        message.textContent = error.message || 'Ro'yxatdan o'tishda xatolik yuz berdi.';
      }
    });
  </script>
</body>
</html>
