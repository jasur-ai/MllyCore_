# MllyCore CI/CD — Smoke + T16 + CRUD test suit
# Har push va pull_request'da ishga tushadi.
#
# Testlar:
#   test:t16    → Pure Node.js AES-256-GCM kripto testi (emulator talab qilmaydi)
#   test:smoke  → Firebase Emulator (auth + firestore) orqali 8 ta endpoint
#   test:crud   → Firebase Emulator (auth + firestore) orqali 48 ta CRUD test
#
# Optimizatsiya:
#   - Firebase Emulator binarylari (~/.cache/firebase/emulators/) cache'da
#     saqlanadi → emulator downloadni (~15s) o'tkazib yuboradi
#   - Yangi firebase-tools versiyasida cache avtomatik invalidatsiya qilinadi
#
# Hammasi parallel ishlaydi → jami ~40 soniya (emulator binary cached)

name: MllyCore CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── T16: encrypted file storage (emulator kerak emas) ─────────────────
  test-t16:
    name: T16 Encryption
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: MllyCore
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'
      - run: npm ci
      - run: npm run test:t16

  # ─── Smoke test (Firebase Emulator talab qiladi) ──────────────────────
  test-smoke:
    name: Smoke (Emulator)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: MllyCore
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'
      - name: Cache Firebase Emulator binaries
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          # Package-lock dagi firebase-tools versiyasi o'zgarsa yangi cache
          key: ${{ runner.os }}-firebase-emulators-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-firebase-emulators-
      - name: Check Java (emulator dependency)
        run: java -version 2>&1 | head -3
      - run: npm ci
      - name: Run smoke test (Firebase emulator)
        run: npm run test:smoke

  # ─── CRUD lifecycle test (Firebase Emulator talab qiladi) ─────────────
  test-crud:
    name: CRUD Lifecycle (Emulator)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: MllyCore
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'
      - name: Cache Firebase Emulator binaries
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          # Package-lock dagi firebase-tools versiyasi o'zgarsa yangi cache
          key: ${{ runner.os }}-firebase-emulators-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-firebase-emulators-
      - name: Check Java (emulator dependency)
        run: java -version 2>&1 | head -3
      - run: npm ci
      - name: Run CRUD lifecycle test (Firebase emulator)
        run: npm run test:crud
