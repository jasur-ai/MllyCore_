# =============================================================================
# MllyCore — Vercel Production Auto-Deploy
# =============================================================================
# Har safar main branch'ga push qilinganda avtomatik Vercel'ga deploy qiladi.
#
# GitHub Secrets (Settings → Secrets and variables → Actions):
#   VERCEL_TOKEN          — Vercel Access Token (Settings → Tokens)
#   VERCEL_ORG_ID         — team_Wl0QVN9UZineSDyKCWTSDeWg
#   VERCEL_PROJECT_ID     — prj_y0MxDPWtULzNi8FgE5KgUshBS9bx
# =============================================================================

name: Vercel Production Deployment

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

on:
  push:
    branches:
      - main
  workflow_dispatch:      # Qo'lda ishga tushirish imkoniyati

jobs:
  Deploy-Production:
    runs-on: ubuntu-latest
    # DIQQAT: Bu repo fayllari root'da joylashgan (MllyCore/ papkasi mavjud EMAS).
    # Shuning uchun working-directory ishlatilmaydi!
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⚡ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 🚀 Install Vercel CLI
        run: npm install --global vercel@latest

      - name: 🔄 Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: 🏗 Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: 📤 Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
