<!DOCTYPE html>
<html lang="uz" class="auth-required" data-required-role="admin">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin paneli - MllyCore</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="app">
    <div class="topbar">
      <div>
        <h1 class="page-title">Admin paneli</h1>
        <p class="page-subtitle">Workspace yaratish va umumiy platforma statistikasi.</p>
      </div>
      <a class="btn btn-primary" href="dashboard.html">+ Workspace yaratish</a>
    </div>

    <div class="grid grid-4 mb-4" id="stats"></div>

    <div class="grid grid-2">
      <div class="card">
        <h3 style="margin:0 0 12px">Admin vazifasi</h3>
        <div class="notice">Admin faqat workspace yaratadi va team lead emailini belgilaydi.</div>
      </div>
      <div class="card">
        <h3 style="margin:0 0 12px">Team lead vazifasi</h3>
        <p class="muted text-sm" style="margin:0">A'zolarni qo'shish, secret key reset qilish va workspace ichidagi ishlarni boshqarish team lead zimmasida.</p>
      </div>
    </div>
  </div>

  <script src="js/firebase-config.js"></script>
  <script src="js/firebase-service.js"></script>
  <script src="js/auth-guard.js"></script>
  <script src="js/layout.js"></script>
  <script>
    (async () => {
      const user = await window.MLLYCORE_AUTH_READY;
      if (!user) return;

      const [users, teams, ideas] = await Promise.all([
        MllyCore.getCollection('users'),
        MllyCore.getCollection('teams'),
        MllyCore.getCollection('ideas')
      ]);

      mountLayout('admin', { profile: window.MLLYCORE_PROFILE, teams: [], notifications: [] });
      document.getElementById('stats').innerHTML = [
        { n: teams.length, l: "Workspace'lar" },
        { n: users.filter(u => u.role === 'team_lead').length, l: 'Team leadlar' },
        { n: users.filter(u => u.role === 'member').length, l: 'A\'zolar' },
        { n: ideas.length, l: "G'oyalar" }
      ].map(s => `<div class="card stat"><div class="stat-icon">${s.l[0]}</div><div><div class="stat-num">${s.n}</div><div class="stat-label">${s.l}</div></div></div>`).join('');
    })();
  </script>
</body>
</html>
