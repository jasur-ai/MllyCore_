<!DOCTYPE html>
<html lang="uz" class="auth-required">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bildirishnomalar - MllyCore</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="app">
    <div class="topbar"><div><h1 class="page-title">Bildirishnomalar</h1><p class="page-subtitle">Workspace va g'oyalar yangiliklari.</p></div></div>
    <div class="card" id="list"></div>
  </div>
  <script src="js/firebase-config.js"></script>
  <script src="js/firebase-service.js"></script>
  <script src="js/auth-guard.js"></script>
  <script src="js/layout.js"></script>
  <script>
    (async () => {
      const user = await window.MLLYCORE_AUTH_READY;
      if (!user) return;
      const data = await MllyCore.getDashboardData(user.uid);
      mountLayout('notif', { profile: window.MLLYCORE_PROFILE, teams: data.teams, notifications: data.notifications });
      document.getElementById('list').innerHTML = data.notifications.length ? data.notifications.map((n) => `
        <div class="flex gap-3 mb-3" style="padding-bottom:12px;border-bottom:1px solid var(--border)">
          ${(n.unread || n.isRead === false) ? '<span class="dot" style="margin-top:6px"></span>' : '<span style="width:8px"></span>'}
          <div><div class="font-semibold text-sm">${n.content || n.text}</div><div class="text-xs muted">${n.type || 'notification'}</div></div>
        </div>
      `).join('') : '<p class="muted">Bildirishnoma yoq.</p>';
    })();
  </script>
</body>
</html>
