<!DOCTYPE html>
<html lang="uz" class="auth-required">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bildirishnomalar - MllyCore</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="app">
    <div class="workspace-app">
      <section class="workspace-command">
        <div>
          <h1 class="workspace-command-title">Notification center</h1>
          <p class="workspace-command-copy">Workspace, member va g'oya activity bo'yicha so'nggi signal va update'lar.</p>
        </div>
      </section>
      <section class="workspace-surface">
        <div class="workspace-surface-head">
          <div>
            <h2>Bildirishnomalar</h2>
            <div class="workspace-surface-copy">Unread itemlar va activity oqimi.</div>
          </div>
          <span class="badge" id="notificationCount">0</span>
        </div>
        <div class="workspace-card-grid" id="list"></div>
      </section>
    </div>
  </div>
  <script src="js/firebase-config.js"></script>
  <script src="js/firebase-service.js"></script>
  <script src="js/auth-guard.js"></script>
  <script src="js/layout.js"></script>
  <script>
    (async () => {
      const user = await window.MLLYCORE_AUTH_READY;
      if (!user) return;
      const data = await MllyCore.getDashboardData(user.uid);
      mountLayout('notif', { profile: window.MLLYCORE_PROFILE, teams: data.teams, notifications: data.notifications });
      document.getElementById('notificationCount').textContent = data.notifications.length;
      document.getElementById('list').innerHTML = data.notifications.length ? data.notifications.map((n) => `
        <div class="workspace-message-item">
          <strong>${n.content || n.text}</strong>
          <div class="text-xs muted">${n.type || 'notification'}</div>
          <span>${(n.unread || n.isRead === false) ? 'Unread' : 'Read'}</span>
        </div>
      `).join('') : '<div class="workspace-empty"><h3>Bildirishnoma yoq</h3><p>Yangi activity paydo bo\'lganda shu yerda ko\'rinadi.</p></div>';
    })();
  </script>
</body>
</html>
