<!DOCTYPE html>
<html lang="uz" class="auth-required">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>G'oyalarim - MllyCore</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="app">
    <div class="topbar"><div><h1 class="page-title">G'oyalarim</h1><p class="page-subtitle">Faqat siz a'zo bo'lgan workspace g'oyalari.</p></div></div>
    <div class="grid grid-2" id="ideas"></div>
  </div>
  <script src="js/firebase-config.js"></script>
  <script src="js/firebase-service.js"></script>
  <script src="js/auth-guard.js"></script>
  <script src="js/layout.js"></script>
  <script>
    (async () => {
      const user = await window.MLLYCORE_AUTH_READY;
      if (!user) return;
      const data = await MllyCore.getDashboardData(user.uid);
      mountLayout('ideas', { profile: window.MLLYCORE_PROFILE, teams: data.teams, notifications: data.notifications });
      document.getElementById('ideas').innerHTML = data.ideas.length ? data.ideas.map((i) => `
        <a href="idea.html?id=${i.id}" class="card card-hover"><span class="badge">${i.status || i.category || '-'}</span><h3>${i.title}</h3><p class="muted text-sm">${i.description || ''}</p></a>
      `).join('') : "<div class=\"card empty-state\"><h3>G'oya yoq</h3><p class=\"muted\">Workspace yaratilgandan keyin g'oyalar shu yerda ko'rinadi.</p></div>";
    })();
  </script>
</body>
</html>
