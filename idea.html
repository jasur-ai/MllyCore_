<!DOCTYPE html>
<html lang="uz" class="auth-required">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>G'oya - MllyCore</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="app">
    <div class="workspace-app" id="ideaApp">
      <div class="workspace-empty loading-copy"><h3>Yuklanmoqda...</h3><p>G'oya tafsiloti olinmoqda.</p></div>
    </div>
  </div>
  <script src="js/theme.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/firebase-service.js"></script>
  <script src="js/auth-guard.js"></script>
  <script src="js/layout.js"></script>
  <script>
    const qs = (key) => new URLSearchParams(location.search).get(key);
    const escapeHtml = (value) => String(value || '').replace(/[&<>"']/g, (char) => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'
    }[char]));
    const fmtDate = (value) => {
      if (!value) return '-';
      const date = value.toDate ? value.toDate() : new Date(value);
      return Number.isNaN(date.getTime()) ? '-' : date.toLocaleString('uz-UZ');
    };

    (async () => {
      const user = await window.MLLYCORE_AUTH_READY;
      if (!user) return;

      const ideaId = qs('id');
      const [dashboard, idea] = await Promise.all([
        MllyCore.getDashboardData(user.uid),
        MllyCore.getIdeaById(ideaId)
      ]);
      mountLayout('ideas', { profile: window.MLLYCORE_PROFILE, teams: dashboard.teams, notifications: dashboard.notifications });
      if (!idea) {
        document.getElementById('ideaApp').innerHTML = '<div class="workspace-empty"><h3>G\'oya topilmadi</h3><p>Bu yozuv mavjud emas yoki sizda ko\'rish huquqi yo\'q.</p></div>';
        return;
      }

      const team = dashboard.teams.find((item) => item.id === idea.teamId);
      document.getElementById('ideaApp').innerHTML = `
        <section class="workspace-command">
          <div>
            <h1 class="workspace-command-title">${escapeHtml(idea.title || "G'oya")}</h1>
            <p class="workspace-command-copy">${escapeHtml(idea.entryType === 'startup' ? 'Startup tafsiloti' : "G'oya tafsiloti")}</p>
          </div>
          <div class="workspace-command-tools">
            <span class="badge ${idea.entryType === 'startup' ? 'badge-active' : ''}">${escapeHtml(idea.entryType || 'idea')}</span>
            <span class="badge">${escapeHtml(idea.status || 'Raw')}</span>
          </div>
        </section>

        <section class="workspace-layout">
          <div class="workspace-main-stack">
            <div class="workspace-surface pad">
              <div class="section-head"><h2>Tavsif</h2></div>
              <p class="workspace-helper" style="font-size:14px">${escapeHtml(idea.description || 'Tavsif kiritilmagan.')}</p>
            </div>

            <div class="workspace-surface pad" id="similarIdeasSurface" style="display:none;">
              <div class="section-head"><h2>🧠 O'xshash g'oyalar (T10)</h2></div>
              <div id="similarIdeasList"></div>
            </div>

            <div class="workspace-surface pad" id="extraIdeaPanel">
              <div class="section-head"><h2>Qo'shimcha imkoniyatlar (T18–T37)</h2></div>
              <div class="workspace-form-grid">
                <div>
                  <label class="label">Bosqich (T29)</label>
                  <select class="select" id="ideaStage">
                    <option value="Raw">Raw</option>
                    <option value="Validated">Validated</option>
                    <option value="Building">Building</option>
                    <option value="Launched">Launched</option>
                  </select>
                </div>
                <div>
                  <label class="label">Ovoz (T34)</label>
                  <button class="btn btn-secondary btn-sm" id="voteIdeaBtn">👍 Ovoz berish</button>
                  <span id="voteCount" class="muted text-sm"></span>
                </div>
                <div>
                  <label class="label">Public (T20)</label>
                  <button class="btn btn-secondary btn-sm" id="togglePublicBtn">Public qilish</button>
                  <span id="publicToken" class="muted text-sm"></span>
                </div>
                <div>
                  <label class="label">Pitch (T19)</label>
                  <button class="btn btn-secondary btn-sm" id="pitchBtn">One-Pager yasash</button>
                </div>
              </div>
              <div class="workspace-form-grid" style="margin-top:12px;">
                <div>
                  <label class="label">Scoring ICE/RICE (T18)</label>
                  <div style="display:flex;gap:8px;flex-wrap:wrap;">
                    <input class="input" id="scoreImpact" type="number" min="0" max="10" placeholder="Impact">
                    <input class="input" id="scoreConfidence" type="number" min="0" max="10" placeholder="Conf">
                    <input class="input" id="scoreEase" type="number" min="0" max="10" placeholder="Ease">
                    <button class="btn btn-primary btn-sm" id="scoreBtn">Ballash</button>
                  </div>
                  <span id="riceOut" class="muted text-sm"></span>
                </div>
              </div>
              <div style="margin-top:12px;">
                <label class="label">Izoh + @mention (T27)</label>
                <textarea class="textarea" id="commentText" rows="2" placeholder="@username ga izoh"></textarea>
                <button class="btn btn-primary btn-sm" id="commentBtn" style="margin-top:6px;">Yuborish</button>
              </div>
              <div style="margin-top:12px;">
                <label class="label">Xavf (T35)</label>
                <div style="display:flex;gap:8px;flex-wrap:wrap;">
                  <input class="input" id="riskTitle" placeholder="Xavf nomi">
                  <input class="input" id="riskLikelihood" type="number" min="1" max="5" placeholder="Ehtimol">
                  <input class="input" id="riskImpact" type="number" min="1" max="5" placeholder="Ta'sir">
                  <button class="btn btn-primary btn-sm" id="riskBtn">Qo'shish</button>
                </div>
              </div>
            </div>

            <div class="workspace-surface pad">
              <div class="section-head"><h2>Keyingi qadam</h2></div>
              <div class="workspace-note-bar">${escapeHtml(team?.name || 'Workspace')} ichiga qaytib, task va chat oqimi bilan bog'lab ishlashingiz mumkin.</div>
              <div class="workspace-form-actions" style="margin-top:14px;justify-content:flex-start">
                <a class="btn btn-primary" href="team.html?id=${idea.teamId}&focus=${idea.entryType === 'startup' ? 'startup' : 'ideas'}&entity=${idea.id}">Workspacega o'tish</a>
              </div>
            </div>
          </div>

          <aside class="workspace-side-stack">
            <div class="workspace-surface pad">
              <h3 style="margin:0 0 12px">Ma'lumotlar</h3>
              <div class="workspace-detail-list">
                <div class="workspace-detail-row"><span>Workspace</span><strong>${escapeHtml(team?.name || idea.teamId || '-')}</strong></div>
                <div class="workspace-detail-row"><span>Muallif</span><strong>${escapeHtml(idea.createdByName || '-')}</strong></div>
                <div class="workspace-detail-row"><span>Mas'ul</span><strong>${escapeHtml(idea.ownerName || '-')}</strong></div>
                <div class="workspace-detail-row"><span>Yaratilgan</span><strong>${escapeHtml(fmtDate(idea.createdAt))}</strong></div>
                <div class="workspace-detail-row"><span>Yangilangan</span><strong>${escapeHtml(fmtDate(idea.updatedAt))}</strong></div>
              </div>
            </div>
          </aside>
        </section>
      `;

      // T10 - O'xshash g'oyalarni ko'rsatish (analyze-ideas orqali to'ldirilgan)
      if (Array.isArray(idea.similarTo) && idea.similarTo.length) {
        const surface = document.getElementById('similarIdeasSurface');
        const list = document.getElementById('similarIdeasList');
        if (surface && list) {
          surface.style.display = '';
          for (const sid of idea.similarTo) {
            try {
              const sim = await MllyCore.getIdeaById(sid);
              if (sim) {
                const a = document.createElement('a');
                a.className = 'workspace-record';
                a.href = 'idea.html?id=' + sid;
                a.style.display = 'block';
                a.style.marginBottom = '8px';
                a.innerHTML = `<div class="workspace-record-top"><h3>${escapeHtml(sim.title || sid)}</h3></div>`;
                list.appendChild(a);
              }
            } catch (_) {}
          }
        }
      }

      // T18–T37 idea.html UI
      (async () => {
        const ideaId = idea.id; const teamId = idea.teamId;
        const stageSel = document.getElementById('ideaStage');
        if (stageSel && idea.stage) stageSel.value = idea.stage;
        stageSel?.addEventListener('change', async () => {
          try { await MllyCore.setStage(ideaId, stageSel.value); UTIL.toast('Bosqich yangilandi'); }
          catch (e) { UTIL.toast(e.message); }
        });
        document.getElementById('voteIdeaBtn')?.addEventListener('click', async () => {
          try { const r = await MllyCore.voteIdea(ideaId); document.getElementById('voteCount').textContent = 'Ovoz: ' + (r.voteCount || 0); UTIL.toast('Ovoz bermadingiz'); }
          catch (e) { UTIL.toast(e.message); }
        });
        document.getElementById('togglePublicBtn')?.addEventListener('click', async () => {
          try { const r = await MllyCore.setPublic(ideaId, true); document.getElementById('publicToken').textContent = 'Token: ' + (r.publicToken || ''); UTIL.toast('Public qilindi'); }
          catch (e) { UTIL.toast(e.message); }
        });
        document.getElementById('pitchBtn')?.addEventListener('click', async () => {
          try { const r = await MllyCore.generatePitch(ideaId); const blob = new Blob([r.html], { type: 'text/html' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'pitch.html'; a.click(); }
          catch (e) { UTIL.toast(e.message); }
        });
        document.getElementById('scoreBtn')?.addEventListener('click', async () => {
          try {
            const r = await MllyCore.scoreIdea(ideaId, {
              impact: +document.getElementById('scoreImpact').value || 0,
              confidence: +document.getElementById('scoreConfidence').value || 0,
              ease: +document.getElementById('scoreEase').value || 0
            });
            document.getElementById('riceOut').textContent = 'RICE: ' + (r.rice || 0);
            UTIL.toast('Ballandi');
          } catch (e) { UTIL.toast(e.message); }
        });
        document.getElementById('commentBtn')?.addEventListener('click', async () => {
          try {
            const text = document.getElementById('commentText').value;
            const mentions = (text.match(/@(\w+)/g) || []).map((m) => m.slice(1));
            await MllyCore.addComment({ ideaId, text, mentions });
            document.getElementById('commentText').value = '';
            UTIL.toast('Izoh yuborildi');
          } catch (e) { UTIL.toast(e.message); }
        });
        document.getElementById('riskBtn')?.addEventListener('click', async () => {
          try {
            await MllyCore.addRisk({ teamId, title: document.getElementById('riskTitle').value, likelihood: +document.getElementById('riskLikelihood').value || 1, impact: +document.getElementById('riskImpact').value || 1 });
            document.getElementById('riskTitle').value = '';
            UTIL.toast("Xavf qo'shildi");
          } catch (e) { UTIL.toast(e.message); }
        });
      })();

      await MllyCore.markNotificationsRead({
        relatedEntityId: idea.id,
        types: ['idea_created', 'idea_imported', 'startup_created', 'startup_owner_changed']
      }).catch(() => {});
    })();
  </script>
</body>
</html>
