<!DOCTYPE html>
<html lang="uz" class="auth-required">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>G'oya - MllyCore</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="app"><div class="card"><h1 class="page-title">G'oya</h1><p class="muted">G'oya tafsilotlari Firestore bilan keyingi bosqichda to'liq ulanadi.</p></div></div>
  <script src="js/firebase-config.js"></script>
  <script src="js/firebase-service.js"></script>
  <script src="js/auth-guard.js"></script>
  <script src="js/layout.js"></script>
  <script>
    (async () => {
      const user = await window.MLLYCORE_AUTH_READY;
      if (!user) return;
      const data = await MllyCore.getDashboardData(user.uid);
      mountLayout('ideas', { profile: window.MLLYCORE_PROFILE, teams: data.teams, notifications: data.notifications });
    })();
  </script>
</body>
</html>
