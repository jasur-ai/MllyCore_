<!DOCTYPE html>
<html lang="uz" class="auth-required">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Profil sozlamalari - MllyCore</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="app">
    <div class="topbar"><div><h1 class="page-title">Profil sozlamalari</h1><p class="page-subtitle">Akkaunt ma'lumotlari.</p></div></div>
    <div class="grid grid-2">
      <div class="card">
        <h3 style="margin:0 0 14px">Profil</h3>
        <label class="label">Ism</label><input class="input mb-3" id="name">
        <label class="label">Username</label><input class="input mb-3" id="username">
        <label class="label">Email</label><input class="input mb-3" id="email" disabled>
        <button class="btn btn-primary" onclick="UTIL.toast('Profil saqlash API keyingi bosqichda ulanadi')">Saqlash</button>
      </div>
      <div class="card">
        <h3 style="margin:0 0 14px">Xavfsizlik</h3>
        <p class="muted text-sm">Parol Firebase Authentication orqali boshqariladi.</p>
        <button class="btn btn-ghost" onclick="UTIL.toast('Parol tiklash keyingi bosqichda ulanadi')">Parolni tiklash</button>
      </div>
    </div>
  </div>
  <script src="js/firebase-config.js"></script>
  <script src="js/firebase-service.js"></script>
  <script src="js/auth-guard.js"></script>
  <script src="js/layout.js"></script>
  <script>
    window.UTIL = window.UTIL || { toast: (msg) => alert(msg) };
    (async () => {
      const user = await window.MLLYCORE_AUTH_READY;
      if (!user) return;
      const profile = window.MLLYCORE_PROFILE;
      mountLayout('profile', { profile, teams: [], notifications: [] });
      document.getElementById('name').value = profile.name || '';
      document.getElementById('username').value = profile.username || '';
      document.getElementById('email').value = profile.email || user.email || '';
    })();
  </script>
</body>
</html>
